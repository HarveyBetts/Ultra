<title>Forge — Forge your life</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
/* ============ DESIGN TOKENS ============ */
:root{
  --bg:#F3F5F8; --bg-2:#F7F9FC;
  --surface:#FFFFFF; --surface-2:#F7F9FC; --surface-3:#EDF1F7;
  --ink:#0F172A; --sub:#647084; --faint:#94A0B2;
  --line:rgba(15,23,42,.08); --line-2:rgba(15,23,42,.05); --hair:rgba(15,23,42,.12);
  --accent:#2F6BFF; --accent-2:#3E78FF; --accent-deep:#2257E6; --accent-ink:#FFFFFF; --accent-soft:rgba(47,107,255,.10);
  --grad:linear-gradient(135deg,#3E78FF 0%,#2257E6 100%);
  --grad-soft:linear-gradient(135deg,rgba(47,107,255,.10),rgba(47,107,255,.04));
  --danger:#DC2626; --warn:#D97706; --ok:#16A34A;
  --shadow:0 8px 24px -12px rgba(15,23,42,.12);
  --shadow-lg:0 16px 40px -18px rgba(15,23,42,.16);
  --mesh:radial-gradient(120% 70% at 50% -12%,rgba(47,107,255,.05),transparent 46%),#F3F5F8;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0;}
html,body{margin:0;width:100%;height:100vh;height:100lvh;min-height:100vh;min-height:100lvh;overflow:hidden;overscroll-behavior:none;touch-action:none;}
html{background:#F3F5F8;}
body{position:relative;}
body{font-family:'Inter',system-ui,sans-serif;color:var(--ink);background:#F3F5F8;display:flex;justify-content:center;-webkit-font-smoothing:antialiased;-webkit-user-select:none;user-select:none;-webkit-text-size-adjust:100%;text-size-adjust:100%;letter-spacing:-0.01em;}
input,textarea{-webkit-user-select:text;user-select:text;font-size:16px;font-family:inherit;}
.serif{font-family:'Sora','Inter',sans-serif;letter-spacing:-0.025em;}
#app{width:100%;max-width:480px;position:fixed;top:0;bottom:0;left:0;right:0;height:100vh;height:100lvh;margin:0 auto;background:var(--mesh);display:flex;flex-direction:column;overflow:hidden;isolation:isolate;}
@media(min-width:520px) and (max-width:899px){#app{box-shadow:0 0 80px rgba(0,0,0,.5);}}
header{position:relative;z-index:3;padding:calc(16px + env(safe-area-inset-top,0px)) 20px 13px;display:flex;align-items:center;gap:11px;border-bottom:1px solid var(--line);flex-shrink:0;background:var(--bg);}
.logo{width:42px;height:42px;border-radius:13px;background:var(--surface-2);display:flex;align-items:center;justify-content:center;color:var(--accent);font-family:'Sora',serif;font-weight:700;font-size:24px;line-height:1;border:1px solid var(--hair);box-shadow:var(--shadow);flex-shrink:0;cursor:pointer;overflow:hidden;transition:transform .18s;}
.logo:active{transform:scale(.92);}
.logo img{width:100%;height:100%;object-fit:cover;}
.logo.sm{width:34px;height:34px;border-radius:11px;font-size:18px;}
.htext{flex:1;min-width:0;}
.htext h1{font-family:'Sora',sans-serif;font-size:23px;font-weight:700;line-height:1;letter-spacing:-0.03em;}
.htext span{font-size:10.5px;color:var(--sub);letter-spacing:.16em;text-transform:uppercase;display:block;margin-top:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:600;}
.pill{display:flex;align-items:center;gap:8px;padding:5px 12px 5px 5px;border-radius:30px;background:var(--surface-2);border:1px solid var(--line);cursor:pointer;transition:background .2s,border-color .2s;flex-shrink:0;}
.pill:active{background:var(--surface-3);}
.pill .nm{font-size:13.5px;font-weight:600;}
.back{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;margin-left:-6px;transition:background .18s,transform .18s;flex-shrink:0;color:var(--ink);}
.back:active{transform:scale(.9);background:var(--surface-2);}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--accent);flex-shrink:0;transition:all .3s;opacity:0;}
.sync-dot.syncing{background:var(--accent);box-shadow:0 0 8px var(--accent);animation:pulse-dot 1s ease-in-out infinite;opacity:1;}
.sync-dot.error{background:var(--danger);opacity:1;}
@keyframes pulse-dot{0%,100%{opacity:1;}50%{opacity:.3;}}
#stage{position:relative;z-index:1;flex:1;overflow:hidden;}
.screen{position:absolute;inset:0;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding:10px 18px calc(64px + env(safe-area-inset-bottom,0px));background:var(--bg);will-change:transform;touch-action:pan-y;overscroll-behavior:contain;}
.screen.retap{animation:scRetap .44s cubic-bezier(.16,1,.3,1);}
@keyframes scRetap{0%{opacity:.5;transform:scale(.986);}100%{opacity:1;transform:none;}}
.screen::-webkit-scrollbar{width:0;}
.screen.is-home{background:var(--mesh),var(--bg);}
.screen.enter-right{transform:translateX(100%);}
.screen.enter-left{transform:translateX(-22%);filter:brightness(.78);}
.screen.show{transform:translateX(0);filter:none;transition:transform .28s cubic-bezier(.22,.85,.26,1),filter .28s ease;}
.screen.exit-left{transform:translateX(-22%);filter:brightness(.78);transition:transform .28s cubic-bezier(.22,.85,.26,1),filter .28s ease;}
.screen.exit-right{transform:translateX(100%);transition:transform .28s cubic-bezier(.22,.85,.26,1);}
/* Tab-bar paired slide — both panels move full width together, no parallax dim */
.screen.tab-enter-right{transform:translateX(100%);}
.screen.tab-enter-left{transform:translateX(-100%);}
.screen.tab-show{transform:translateX(0);transition:transform .7s cubic-bezier(.4,0,.2,1);}
.screen.tab-exit-left{transform:translateX(-100%);transition:transform .7s cubic-bezier(.4,0,.2,1);}
.screen.tab-exit-right{transform:translateX(100%);transition:transform .7s cubic-bezier(.4,0,.2,1);}
.screen.dragging{transition:none!important;filter:none!important;}
/* ============ HOME ============ */
.home-grid{display:grid;grid-template-columns:1fr 1fr;gap:clamp(9px,2.8vw,13px);}
.tile{position:relative;border-radius:clamp(18px,4.6vw,22px);padding:clamp(14px,3.7vw,18px);min-height:clamp(102px,27vw,134px);cursor:pointer;display:flex;flex-direction:column;justify-content:space-between;overflow:hidden;background:var(--surface);border:1px solid var(--line);box-shadow:var(--shadow);transition:transform .22s cubic-bezier(.2,.8,.2,1),border-color .22s,box-shadow .22s;}
.tile::after{content:'';position:absolute;inset:0;border-radius:inherit;pointer-events:none;background:radial-gradient(75% 60% at 92% 6%,color-mix(in srgb,var(--tc,transparent) 16%,transparent),transparent 68%);}
.tile:hover{transform:translateY(-3px);border-color:var(--hair);box-shadow:var(--shadow-lg);}
.tile:active{transform:translateY(0) scale(.975);}
.tile .chip{position:relative;z-index:1;width:clamp(38px,10vw,42px);height:clamp(38px,10vw,42px);border-radius:clamp(11px,3vw,13px);display:flex;align-items:center;justify-content:center;color:var(--tc,var(--accent));background:color-mix(in srgb,var(--tc,var(--accent)) 15%,transparent);box-shadow:inset 0 0 0 1px color-mix(in srgb,var(--tc,var(--accent)) 28%,transparent);}
.tile .t{position:relative;z-index:1;font-weight:700;font-size:clamp(14.5px,4.1vw,16.5px);line-height:1.12;color:var(--ink);letter-spacing:-0.02em;}
.tile .s{position:relative;z-index:1;font-size:clamp(10.5px,3vw,12px);color:var(--sub);margin-top:3px;line-height:1.2;}
.tile.hero{grid-column:1/-1;min-height:0;background:var(--grad);color:var(--accent-ink);border:none;box-shadow:0 18px 44px -20px color-mix(in srgb,var(--accent) 70%,transparent);gap:6px;padding:20px 22px;justify-content:center;align-items:flex-start;}
.tile.hero::after{background:radial-gradient(80% 120% at 100% 0%,rgba(255,255,255,.18),transparent 60%);}
.tile.hero .hero-greet{font-family:'Sora',sans-serif;font-size:clamp(22px,6.2vw,27px);font-weight:700;margin-top:8px;line-height:1.02;letter-spacing:-0.03em;position:relative;z-index:1;}
.tile.hero .hero-sub{font-size:13.5px;opacity:.8;margin-top:3px;position:relative;z-index:1;font-weight:500;}
.home-lbl{grid-column:1/-1;font-size:10.5px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--sub);margin:15px 2px 1px;}
.home-grid .hero+.home-lbl{margin-top:7px}
.feat{grid-column:1/-1;display:flex;align-items:center;gap:14px;cursor:pointer;background:var(--surface);border:1px solid var(--line);border-radius:20px;padding:16px 18px;box-shadow:var(--shadow);transition:transform .2s,border-color .2s;}
.feat:active{transform:scale(.99)}
.feat .t{font-family:'Sora',sans-serif;font-weight:700;font-size:16.5px;letter-spacing:-.01em;color:var(--ink)}
.feat .s{font-size:13px;color:var(--sub);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.feat-go{color:var(--sub);font-size:18px;flex:none}
.hero-eyebrow{display:flex;align-items:center;gap:7px;font-size:11px;font-weight:700;letter-spacing:.04em;opacity:.92;position:relative;z-index:1}
.tile.hero>div:first-child{position:relative;z-index:1;}
.tile.ghost{background:transparent;border:1px dashed var(--hair);box-shadow:none;}
.tile.ghost::after{display:none;}
.tile.ghost .t{color:var(--sub);}.tile.ghost .chip{color:var(--sub);background:var(--surface-2);box-shadow:inset 0 0 0 1px var(--line);}
.screen.show .tile:nth-child(1){animation-delay:.02s}.screen.show .tile:nth-child(2){animation-delay:.06s}.screen.show .tile:nth-child(3){animation-delay:.1s}.screen.show .tile:nth-child(4){animation-delay:.14s}.screen.show .tile:nth-child(5){animation-delay:.18s}.screen.show .tile:nth-child(6){animation-delay:.22s}.screen.show .tile:nth-child(7){animation-delay:.26s}.screen.show .tile:nth-child(8){animation-delay:.3s}.screen.show .tile:nth-child(9){animation-delay:.34s}.screen.show .tile:nth-child(10){animation-delay:.38s}.screen.show .tile:nth-child(11){animation-delay:.42s}.screen.show .tile:nth-child(12){animation-delay:.46s}
@keyframes tIn{0%{opacity:0;transform:translateY(24px) scale(.93);}55%{opacity:1;}100%{opacity:1;transform:none;}}
/* ============ CARDS ============ */
.card{background:var(--surface);border-radius:16px;padding:18px;border:1px solid var(--line);box-shadow:var(--shadow);}
.stack{display:grid;gap:13px;max-width:560px;margin-inline:auto;width:100%;}
.ctitle{font-size:11px;font-weight:700;color:var(--sub);letter-spacing:.1em;text-transform:uppercase;margin:2px 2px 12px;}
.row{display:flex;align-items:center;gap:12px;padding:12px 8px;border-radius:13px;transition:background .18s;}
.row:active{background:var(--surface-3);}
.dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.row .rt{font-weight:600;font-size:15px;letter-spacing:-0.01em;}.row .rs{font-size:12.5px;color:var(--sub);margin-top:1px;}
.dark{background:#0F172A;color:#FFFFFF;border:none;box-shadow:0 14px 32px -14px rgba(15,23,42,.45);position:relative;overflow:hidden;}
.dark::before{content:'';position:absolute;inset:0;background:radial-gradient(90% 120% at 100% 0%,color-mix(in srgb,var(--accent) 16%,transparent),transparent 55%);pointer-events:none;}
.dark>*{position:relative;z-index:1;}
.dark .small{font-size:12px;color:rgba(255,255,255,.62);font-weight:600;letter-spacing:.04em;}
.two{display:grid;grid-template-columns:1fr 1fr;gap:11px;}
.stat .k{display:flex;align-items:center;gap:7px;color:var(--sub);font-size:12px;margin-bottom:8px;font-weight:600;}
.stat .v{font-weight:700;font-size:22px;letter-spacing:-0.02em;font-variant-numeric:tabular-nums;}.stat .d{font-size:12px;color:var(--sub);margin-top:2px;}
.checkbox{width:20px;height:20px;border-radius:6px;border:2px solid var(--hair);flex-shrink:0;}
.circlebox{width:20px;height:20px;border-radius:50%;border:2px solid var(--hair);flex-shrink:0;}
.cal{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;text-align:center;}
.cal .h{font-size:11px;color:var(--sub);font-weight:700;padding-bottom:4px;}
.cal .cell{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:11px;font-size:13px;font-weight:500;}
.cal .today{background:var(--grad);color:var(--accent-ink);font-weight:700;}
.evdot{width:4px;height:4px;border-radius:50%;background:var(--accent);margin-top:2px;}
.bar{height:8px;border-radius:8px;background:var(--surface-3);overflow:hidden;}
.bar>div{height:100%;border-radius:8px;}
.badge{font-size:11px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;padding:3px 9px;border-radius:20px;background:color-mix(in srgb,var(--accent) 16%,transparent);color:var(--accent);}
.uav{border-radius:50%;background:var(--grad);color:var(--accent-ink);display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0;overflow:hidden;}
.uav img{width:100%;height:100%;object-fit:cover;}
/* ============ FAB ============ */
.fab{position:absolute;bottom:calc(84px + env(safe-area-inset-bottom,0px));right:22px;width:56px;height:56px;border-radius:18px;background:var(--grad);color:var(--accent-ink);display:flex;align-items:center;justify-content:center;box-shadow:0 14px 30px -10px color-mix(in srgb,var(--accent) 75%,transparent);cursor:pointer;border:none;transition:transform .2s cubic-bezier(.2,.8,.2,1),box-shadow .2s;z-index:40;}
.fab:hover{transform:translateY(-2px) rotate(90deg);}
.fab:active{transform:scale(.9);}
/* ============ OVERLAY / SHEET ============ */
.overlay{position:absolute;inset:0;background:rgba(15,23,42,.32);backdrop-filter:blur(7px) saturate(1.1);-webkit-backdrop-filter:blur(7px) saturate(1.1);display:flex;align-items:flex-end;justify-content:center;z-index:50;animation:fade .25s ease;}
.sheet{width:100%;background:var(--surface);border:1px solid var(--line);border-bottom:none;border-radius:22px 22px 0 0;padding:24px 22px calc(30px + env(safe-area-inset-bottom,0px));animation:up .34s cubic-bezier(.2,.85,.25,1);max-height:90%;overflow-y:auto;box-shadow:0 -16px 48px -20px rgba(15,23,42,.25);}
.sheet h3{font-family:'Sora',sans-serif;font-size:20px;font-weight:700;letter-spacing:-0.02em;}
.sheet p{font-size:13.5px;color:var(--sub);margin-top:4px;margin-bottom:14px;}
.sheet textarea{width:100%;min-height:96px;border:1px solid var(--line);border-radius:14px;padding:13px;font-family:inherit;font-size:16px;resize:none;background:var(--surface-2);color:var(--ink);}
.sheet textarea:focus{outline:none;border-color:var(--accent);}
.sheet input{width:100%;border:1px solid var(--line);border-radius:14px;padding:13px 14px;font-family:inherit;font-size:16px;background:var(--surface-2);color:var(--ink);margin-bottom:10px;}
.sheet input:focus{outline:none;border-color:var(--accent);}
.btnrow{display:flex;gap:10px;margin-top:14px;}
.btn{flex:1;padding:14px;border-radius:14px;border:none;font-family:inherit;font-size:15px;font-weight:700;cursor:pointer;transition:transform .15s,filter .15s;}
.btn:active{transform:scale(.97);}
.btn-primary{background:var(--grad);color:var(--accent-ink);}
.btn-ghost{background:var(--surface-3);color:var(--ink);border:1px solid var(--line);}
.done{text-align:center;padding:10px 0 4px;}
.done .tick{width:56px;height:56px;border-radius:50%;background:var(--grad);color:var(--accent-ink);display:flex;align-items:center;justify-content:center;margin:0 auto 12px;box-shadow:0 12px 26px -10px color-mix(in srgb,var(--accent) 70%,transparent);}
/* ============ LOCK / INTRO (always dark, premium) ============ */
.lock{position:absolute;inset:0;z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--ink);background:radial-gradient(130% 100% at 50% 12%,#FFFFFF 0%,#F3F5F8 55%,#F3F5F8 100%);overflow:hidden;}
.lock.hide{animation:lift .32s cubic-bezier(.6,0,.2,1) forwards;}
@keyframes lift{to{opacity:0;transform:scale(1.03);visibility:hidden;}}
.glow{position:absolute;width:440px;height:440px;border-radius:50%;background:radial-gradient(circle,rgba(47,107,255,.10),rgba(47,107,255,.05) 45%,transparent 70%);filter:blur(12px);top:42%;left:50%;transform:translate(-50%,-50%);animation:gpulse 5s ease-in-out infinite;}
@keyframes gpulse{0%,100%{opacity:.6;transform:translate(-50%,-50%) scale(1);}50%{opacity:1;transform:translate(-50%,-50%) scale(1.12);}}
#intro{position:fixed;top:0;bottom:0;left:0;right:0;height:100vh;height:100lvh;z-index:100;background:radial-gradient(130% 110% at 50% 38%,#0E1730 0%,#080D1C 58%,#04060E 100%)!important;}
#intro.hide{animation:introFade .5s cubic-bezier(.4,0,.2,1) forwards!important;}
@keyframes introFade{to{opacity:0;}}
.intro-stage{position:relative;z-index:3;display:flex;flex-direction:column;align-items:center;}
.intro-logowrap{position:relative;display:flex;align-items:center;justify-content:center;}
/* single radial bloom behind the mark — blooms once as the icon lands, then holds */
.intro-glow{position:absolute;width:340px;height:340px;border-radius:50%;background:radial-gradient(circle,rgba(60,120,255,.55),rgba(60,120,255,.12) 46%,transparent 70%);opacity:0;transform:scale(.5);animation:glowBloom 1.4s cubic-bezier(.22,.61,.36,1) .55s forwards;}
@keyframes glowBloom{0%{opacity:0;transform:scale(.5);}55%{opacity:.85;}100%{opacity:.6;transform:scale(1);}}
/* THE hero move: icon starts tiny and soft, grows into place with one spring overshoot */
.intro-mark{position:relative;z-index:1;width:124px;height:124px;border-radius:30px;overflow:hidden;opacity:0;transform:scale(.32);will-change:transform,opacity;animation:markGrow 1.25s cubic-bezier(.34,1.32,.5,1) .15s forwards;box-shadow:0 30px 70px -18px rgba(24,48,130,.85);}
.intro-mark img{width:100%;height:100%;object-fit:cover;display:block;}
@keyframes markGrow{0%{opacity:0;transform:scale(.32);}40%{opacity:1;}70%{transform:scale(1.06);}100%{opacity:1;transform:scale(1);}}
/* one clean sheen sweep, timed to land just after the icon settles */
.intro-sheen{position:absolute;inset:0;z-index:2;pointer-events:none;border-radius:30px;overflow:hidden;}
.intro-sheen:before{content:"";position:absolute;top:-50%;left:-150%;width:60%;height:200%;background:linear-gradient(100deg,transparent,rgba(255,255,255,.55),transparent);transform:skewX(-18deg);animation:sheen 1s cubic-bezier(.4,0,.2,1) 1.15s forwards;}
@keyframes sheen{0%{left:-150%;}100%{left:180%;}}
/* wordmark: a single clean rise + fade — no per-letter blur theatrics */
.intro-word{margin-top:34px;font-family:'Sora',sans-serif;font-size:34px;font-weight:700;letter-spacing:.34em;padding-left:.34em;color:#fff;position:relative;z-index:3;text-align:center;opacity:0;transform:translateY(12px);animation:wordRise .8s cubic-bezier(.22,.61,.36,1) 1.0s forwards;}
@keyframes wordRise{0%{opacity:0;transform:translateY(12px);}100%{opacity:1;transform:translateY(0);}}
.intro-tag{margin-top:16px;font-size:10.5px;letter-spacing:.46em;padding-left:.46em;color:#7FA8FF;text-transform:uppercase;font-weight:600;opacity:0;transform:translateY(8px);animation:tagRise .8s cubic-bezier(.22,.61,.36,1) 1.3s forwards;position:relative;z-index:3;}
@keyframes tagRise{0%{opacity:0;transform:translateY(8px);}100%{opacity:1;transform:translateY(0);}}
/* ============ PIN ============ */
.pin-wrap{width:100%;max-width:312px;display:flex;flex-direction:column;align-items:center;position:relative;z-index:3;padding:0 22px;animation:fade .5s ease;}
.pin-logo{width:60px;height:60px;border-radius:17px;border:1px solid rgba(15,23,42,.10);display:flex;align-items:center;justify-content:center;overflow:hidden;margin-bottom:22px;box-shadow:0 16px 40px -16px rgba(20,24,40,.2);}
.pin-logo img{width:100%;height:100%;object-fit:cover;}
.pin-title{font-family:'Sora',sans-serif;font-size:23px;font-weight:700;margin-bottom:7px;text-align:center;letter-spacing:-0.02em;}
.pin-sub{font-size:13px;color:var(--sub);margin-bottom:28px;text-align:center;line-height:1.5;}
.dots{display:flex;gap:16px;margin-bottom:38px;}
.dot-pin{width:13px;height:13px;border-radius:50%;border:1.5px solid rgba(15,23,42,.18);transition:transform .12s,background .12s,border-color .12s,box-shadow .12s;}
.dot-pin.on{background:var(--accent);border-color:var(--accent);transform:scale(1.15);box-shadow:0 6px 14px -4px rgba(47,107,255,.55);}
.dots.err{animation:shake .42s;}
@keyframes shake{0%,100%{transform:translateX(0);}20%,60%{transform:translateX(-9px);}40%,80%{transform:translateX(9px);}}
.keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:clamp(13px,4.4vw,22px);width:100%;justify-items:center;margin-bottom:clamp(30px,9vh,60px);}
.key{aspect-ratio:1;width:clamp(60px,19vw,80px);border-radius:50%;background:#FFFFFF;border:1px solid var(--line);box-shadow:0 4px 14px -8px rgba(15,23,42,.16);color:var(--ink);font-family:'Inter',sans-serif;font-size:clamp(24px,6.4vw,28px);font-weight:400;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .08s ease,background .12s,border-color .12s;-webkit-user-select:none;user-select:none;}
.key:active{transform:scale(.92);background:var(--accent-soft);border-color:rgba(47,107,255,.40);}
.key.blank{background:transparent;border:none;box-shadow:none;cursor:default;}
.key.fn{font-size:clamp(12px,3.4vw,14px);letter-spacing:.02em;color:var(--sub);background:transparent;border:none;box-shadow:none;font-weight:600;}
.pin-alt{position:absolute;bottom:calc(30px + env(safe-area-inset-bottom,0px));left:0;right:0;margin:0 auto;font-size:14px;color:var(--accent);letter-spacing:.01em;background:none;border:none;cursor:pointer;font-family:inherit;font-weight:700;z-index:4;}
.pin-back{position:absolute;top:calc(20px + env(safe-area-inset-top,0px));left:20px;width:40px;height:40px;border-radius:50%;background:rgba(15,23,42,.05);border:none;color:var(--ink);display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:4;}
/* ============ SIGNUP ============ */
.signup-field{width:100%;background:rgba(0,0,0,.04);border:1px solid rgba(0,0,0,.10);border-radius:15px;padding:15px 16px;color:#0F172A;font:16px 'Inter',sans-serif;margin-bottom:12px;}
.signup-field::placeholder{color:var(--faint);}
.signup-field:focus{outline:none;border-color:var(--accent);}
.signup-btn{width:100%;padding:15px;border-radius:15px;border:none;background:var(--grad);color:var(--accent-ink);font:800 16px 'Inter',sans-serif;cursor:pointer;margin-top:6px;transition:transform .15s,opacity .2s;box-shadow:0 14px 30px -14px rgba(47,107,255,.55);}
.signup-btn:active{transform:scale(.97);}
.signup-btn:disabled{opacity:.45;}
/* ============ SEGMENTED ============ */
.seg{display:flex;gap:4px;background:var(--surface-2);padding:4px;border-radius:14px;margin-bottom:14px;border:1px solid var(--line);}
.seg-btn{flex:1;border:none;background:transparent;padding:9px 8px;border-radius:10px;font:700 13px 'Inter',sans-serif;color:var(--sub);cursor:pointer;transition:all .2s;}
.seg-btn.on{background:var(--grad);color:var(--accent-ink);box-shadow:0 6px 16px -8px color-mix(in srgb,var(--accent) 70%,transparent);}
.seg.sm{margin:0;border:none;background:var(--surface-3);}.seg.sm .seg-btn{padding:6px 12px;font-size:12px;flex:0 0 auto;}
/* ============ TAB MANAGER / CHIPS ============ */
.trow{display:flex;align-items:center;gap:12px;padding:10px 4px;}
.chip.sm{width:34px;height:34px;border-radius:11px;color:var(--tc,var(--accent));background:color-mix(in srgb,var(--tc,var(--accent)) 15%,transparent);box-shadow:inset 0 0 0 1px color-mix(in srgb,var(--tc,var(--accent)) 28%,transparent);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.tbtn{border:1px solid var(--line);background:var(--surface-2);color:var(--ink);font:700 12.5px 'Inter',sans-serif;padding:7px 14px;border-radius:20px;cursor:pointer;transition:all .18s;}
.tbtn:active{transform:scale(.94);}
.tbtn.add{background:var(--grad);color:var(--accent-ink);border-color:transparent;}
.tbtn.rm{color:var(--danger);}
.del{background:none;border:none;color:var(--faint);cursor:pointer;padding:6px;border-radius:8px;display:inline-flex;align-items:center;transition:color .15s,background .15s;}
.del:active{color:var(--danger);background:color-mix(in srgb,var(--danger) 14%,transparent);}
/* ============ ACCOUNT ============ */
.acct-head{display:flex;align-items:center;gap:14px;margin-bottom:18px;}
.acct-list{display:flex;flex-direction:column;gap:4px;margin-bottom:8px;}
.acct-item{display:flex;align-items:center;gap:12px;width:100%;border:none;background:transparent;padding:13px 6px;border-radius:12px;font:600 15px 'Inter',sans-serif;color:var(--ink);cursor:pointer;text-align:left;transition:background .15s;}
.acct-item:active{background:var(--surface-3);}
.acct-item>span{flex:1;}
.theme-row{justify-content:space-between;cursor:default;}
.photo-ctrls{display:flex;gap:10px;margin-bottom:12px;}
/* ============ MISC VIEWS ============ */
/* ---- Countdown: rich coloured cards ---- */
.cd-list{display:flex;flex-direction:column;gap:11px;}
.cd-row{position:relative;display:flex;align-items:stretch;border-radius:18px;overflow:hidden;box-shadow:var(--shadow);cursor:pointer;-webkit-tap-highlight-color:transparent;transition:transform .16s;}
.cd-row:active{transform:scale(.985);}
.cd-row-main{flex:1;display:flex;align-items:center;gap:13px;padding:15px 14px;min-width:0;}
.cd-emoji{flex-shrink:0;width:46px;height:46px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:27px;line-height:1;background:rgba(255,255,255,.28);}
.cd-txt{min-width:0;flex:1;}
.cd-name{font-family:'Sora',sans-serif;font-weight:700;font-size:18px;line-height:1.15;letter-spacing:-.01em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cd-sub{font-size:13px;font-weight:600;opacity:.72;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cd-date{display:flex;align-items:center;gap:5px;font-size:12.5px;font-weight:600;opacity:.62;margin-top:5px;}
.cd-num{flex-shrink:0;width:108px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 6px;}
.cd-num-big{font-family:'Sora',sans-serif;font-weight:800;font-size:40px;line-height:.95;letter-spacing:-.03em;font-variant-numeric:tabular-nums;}
.cd-num-lbl{font-size:11.5px;font-weight:600;opacity:.8;margin-top:3px;}
.cd-section-lbl{font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--sub);margin:6px 2px 2px;}
.cd-filter{display:flex;gap:7px;overflow-x:auto;padding:2px 0 2px;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.cd-filter::-webkit-scrollbar{display:none;}
.cd-chip{flex-shrink:0;font-size:12.5px;font-weight:600;padding:7px 13px;border-radius:999px;border:1px solid var(--line);background:var(--surface);color:var(--sub);cursor:pointer;white-space:nowrap;}
.cd-chip.on{background:var(--ink);color:var(--bg);border-color:var(--ink);}
.cd-count{display:flex;justify-content:center;gap:0;margin:14px auto 2px;width:fit-content;background:var(--surface-2);border:1px solid var(--line);border-radius:999px;overflow:hidden;font-size:13px;font-weight:600;}
.cd-count span{padding:8px 16px;color:var(--sub);}
.cd-count span b{color:var(--ink);font-weight:800;margin-left:5px;}
.cd-count span+span{border-left:1px solid var(--line);}
/* ---- Countdown editor sheet ---- */
.cde-head{display:flex;align-items:center;gap:12px;background:var(--surface-2);border:1px solid var(--line);border-radius:16px;padding:11px;margin-bottom:14px;}
.cde-iconbtn{flex-shrink:0;width:60px;height:60px;border-radius:15px;display:flex;align-items:center;justify-content:center;font-size:34px;cursor:pointer;border:none;transition:transform .14s;}
.cde-iconbtn:active{transform:scale(.92);}
.cde-titles{flex:1;min-width:0;display:flex;flex-direction:column;gap:5px;}
.cde-titles input{width:100%;border:none;background:transparent;color:var(--ink);font-family:'Sora',sans-serif;font-weight:700;font-size:19px;padding:0;outline:none;}
.cde-titles input.sub{font-family:'Inter',sans-serif;font-weight:500;font-size:14px;color:var(--sub);}
.cde-field{display:flex;align-items:center;justify-content:space-between;gap:10px;background:var(--surface-2);border:1px solid var(--line);border-radius:13px;padding:13px 14px;margin-bottom:9px;}
.cde-field label{font-size:14px;font-weight:600;color:var(--sub);display:flex;align-items:center;gap:9px;}
.cde-field input,.cde-field select{border:none;background:transparent;color:var(--ink);font-size:15px;font-weight:600;text-align:right;outline:none;font-family:inherit;max-width:62%;}
.cde-field input[type=date],.cde-field input[type=time]{cursor:pointer;}
.cde-field select{cursor:pointer;-webkit-appearance:none;appearance:none;padding-right:2px;}
.cde-row2{display:flex;gap:9px;}
.cde-row2>.cde-field{flex:1;margin-bottom:9px;}
/* ---- icon & colour picker sheet ---- */
.pk-sheet{max-height:78vh;display:flex;flex-direction:column;}
.pk-tabs{display:flex;gap:8px;margin-bottom:12px;}
.pk-tab{flex:1;text-align:center;font-size:13px;font-weight:700;padding:9px;border-radius:11px;background:var(--surface-2);border:1px solid var(--line);color:var(--sub);cursor:pointer;}
.pk-tab.on{background:var(--accent);color:#fff;border-color:var(--accent);}
.pk-search{width:100%;border:1px solid var(--line);background:var(--surface-2);border-radius:12px;padding:11px 14px;font-size:14px;color:var(--ink);outline:none;margin-bottom:12px;font-family:inherit;}
.pk-scroll{overflow-y:auto;-webkit-overflow-scrolling:touch;flex:1;}
.pk-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:9px;}
.pk-emoji{aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:25px;border-radius:13px;background:var(--surface-2);cursor:pointer;border:2px solid transparent;transition:transform .12s;}
.pk-emoji:active{transform:scale(.88);}
.pk-emoji.on{border-color:var(--accent);background:var(--accent)1A;}
.pk-cat{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--sub);margin:14px 2px 8px;}
.pk-cat:first-child{margin-top:0;}
.pk-colors{display:grid;grid-template-columns:repeat(6,1fr);gap:11px;}
.pk-color{aspect-ratio:1;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:transform .12s;}
.pk-color:active{transform:scale(.88);}
.pk-color.on{border-color:var(--ink);box-shadow:0 0 0 2px var(--bg) inset;}
/* ---- full-screen live detail ---- */
.cd-detail{position:fixed;inset:0;z-index:120;display:flex;flex-direction:column;animation:cdDetailIn .34s cubic-bezier(.22,.85,.26,1);}
@keyframes cdDetailIn{from{opacity:0;transform:scale(.97)}to{opacity:1;transform:none}}
.cd-detail-bar{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;padding-top:calc(14px + env(safe-area-inset-top));}
.cd-detail-bar button{width:42px;height:42px;border-radius:50%;border:none;background:rgba(0,0,0,.18);color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;}
.cd-detail-body{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:20px;}
.cd-detail-emoji{font-size:96px;line-height:1;margin-bottom:22px;filter:drop-shadow(0 12px 28px rgba(0,0,0,.25));}
.cd-detail-name{font-family:'Sora',sans-serif;font-weight:800;font-size:38px;letter-spacing:-.02em;color:#fff;}
.cd-detail-sub{font-size:16px;font-weight:600;color:rgba(255,255,255,.78);margin-top:8px;}
.cd-detail-date{font-size:17px;font-weight:600;color:rgba(255,255,255,.72);margin-top:14px;}
.cd-detail-foot{padding:26px 20px calc(34px + env(safe-area-inset-bottom));}
.cd-detail-starts{text-align:center;font-size:13px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.7);margin-bottom:14px;}
.cd-ticker{display:flex;justify-content:center;gap:8px;}
.cd-tick{flex:1;max-width:84px;text-align:center;}
.cd-tick-n{font-family:'Sora',sans-serif;font-weight:800;font-size:42px;line-height:1;color:#fff;font-variant-numeric:tabular-nums;}
.cd-tick-l{font-size:13px;font-weight:600;color:rgba(255,255,255,.7);margin-top:6px;}
.cd-card .cd-big{font-family:'Sora',sans-serif;font-weight:700;font-size:54px;line-height:1;margin:10px 0 6px;color:var(--accent);letter-spacing:-0.03em;font-variant-numeric:tabular-nums;}
.meal-row{cursor:pointer;}
.note{margin-top:10px;font-size:12px;color:var(--sub);display:flex;align-items:flex-start;gap:7px;padding:9px 11px;background:color-mix(in srgb,var(--accent) 8%,transparent);border:1px solid color-mix(in srgb,var(--accent) 16%,transparent);border-radius:11px;line-height:1.45;}
.ai-wrap{display:flex;flex-direction:column;min-height:calc(100% - 4px);}
.ai-thread{flex:1;display:flex;flex-direction:column;gap:10px;padding:6px 2px 12px;}
.ai-msg{max-width:82%;padding:11px 14px;border-radius:18px;font-size:14.5px;line-height:1.45;}
.ai-msg.me{align-self:flex-end;background:var(--grad);color:var(--accent-ink);border-bottom-right-radius:6px;font-weight:500;}
.ai-msg.ai{align-self:flex-start;background:var(--surface-2);border:1px solid var(--line);border-bottom-left-radius:6px;}
.ai-empty{text-align:center;color:var(--sub);padding:36px 20px;}
.ai-empty svg{color:var(--accent);}
.ai-bar{position:sticky;bottom:0;display:flex;gap:8px;padding:10px 0 2px;background:linear-gradient(transparent,var(--bg) 28%);}
.ai-bar input{flex:1;border:1px solid var(--line);background:var(--surface-2);border-radius:24px;padding:13px 16px;font:16px 'Inter',sans-serif;color:var(--ink);}
.ai-bar input:focus{outline:none;border-color:var(--accent);}
.ai-bar button{width:46px;height:46px;border-radius:50%;border:none;background:var(--grad);color:var(--accent-ink);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.ai-empty{text-align:center;color:var(--sub);padding:34px 10px;display:flex;flex-direction:column;align-items:center;}
.ai-empty .rt{color:var(--ink);font-weight:600;font-size:16px;}
.ai-chips{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:18px;max-width:340px;}
.ai-chip{background:var(--surface-2);border:1px solid var(--line);color:var(--ink);border-radius:20px;padding:9px 14px;font:500 13px 'Inter',sans-serif;cursor:pointer;transition:.15s;}
.ai-chip:hover{border-color:var(--accent);color:var(--accent);}
.ai-msg.typing{display:inline-flex;gap:5px;align-items:center;padding:14px 16px;}
.ai-msg.typing span{width:6px;height:6px;border-radius:50%;background:var(--sub);animation:aidot 1s infinite;}
.ai-msg.typing span:nth-child(2){animation-delay:.15s;}
.ai-msg.typing span:nth-child(3){animation-delay:.3s;}
@keyframes aidot{0%,60%,100%{opacity:.25;transform:translateY(0);}30%{opacity:.9;transform:translateY(-3px);}}
.cat-ai{border-style:solid;color:var(--accent);}
.reqbtn{margin-top:18px;width:100%;padding:15px;border:1px dashed var(--hair);border-radius:18px;background:transparent;color:var(--sub);font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:border-color .2s,color .2s;}
.reqbtn:active{border-color:var(--accent);color:var(--accent);}
.toast{position:absolute;bottom:calc(34px + env(safe-area-inset-bottom,0px));left:50%;transform:translate(-50%,20px) scale(.96);background:#0F172A;color:#fff;border:none;padding:11px 18px;border-radius:24px;font-size:13.5px;font-weight:700;opacity:0;transition:transform .45s cubic-bezier(.34,1.56,.64,1),opacity .3s;z-index:300;pointer-events:none;box-shadow:0 12px 30px -12px rgba(15,23,42,.22);white-space:nowrap;}
.toast.show{opacity:1;transform:translate(-50%,0) scale(1);}
.rcv-iv{display:flex;align-items:center;gap:13px;padding:11px 0;border-bottom:1px solid var(--line);}
.rcv-iv:last-child{border-bottom:none;}
.rcv-ix{width:22px;height:22px;border-radius:7px;background:var(--accent-soft);color:var(--accent);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex:none;}
svg{display:block;}
@keyframes fade{from{opacity:0;}to{opacity:1;}}
@keyframes up{from{transform:translateY(100%);}to{transform:none;}}
/* ============ WELCOME ============ */
.welcome{position:absolute;inset:0;z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;background:radial-gradient(130% 100% at 50% 18%,#FFFFFF 0%,#F3F5F8 52%,#F3F5F8 100%);color:#0F172A;overflow:hidden;}
.welcome::after{content:'';position:absolute;width:420px;height:420px;border-radius:50%;background:radial-gradient(circle,rgba(77,107,255,.12),transparent 68%);filter:blur(12px);}
.welcome.in .wel-mark,.welcome.in .wel-hi,.welcome.in .wel-name{opacity:1;transform:none;}
.wel-mark{position:relative;z-index:1;width:88px;height:88px;border-radius:25px;border:1px solid rgba(15,23,42,.10);display:flex;align-items:center;justify-content:center;overflow:hidden;opacity:0;transform:scale(.8);transition:all .6s cubic-bezier(.2,.85,.25,1);box-shadow:0 20px 50px -18px rgba(20,24,40,.2);}
.wel-mark img{width:100%;height:100%;object-fit:cover;}
.wel-hi{position:relative;z-index:1;font-size:18px;font-weight:500;opacity:0;transform:translateY(10px);transition:all .5s ease .15s;margin-top:22px;color:var(--sub);}
.wel-name{position:relative;z-index:1;font-family:'Sora',sans-serif;font-size:34px;font-weight:700;opacity:0;transform:translateY(10px);transition:all .5s cubic-bezier(.2,.85,.25,1) .28s;letter-spacing:-0.02em;}
.welcome.hide{opacity:0;transition:opacity .55s ease;}
/* ============ TUTORIAL ============ */
.tut{position:absolute;inset:0;z-index:180;background:radial-gradient(130% 100% at 50% 14%,#FFFFFF 0%,#F3F5F8 52%,#F3F5F8 100%);color:#0F172A;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:34px 30px calc(40px + env(safe-area-inset-bottom,0px));text-align:center;}
.tut.hide{opacity:0;transition:opacity .5s ease;}
.tut-icon{width:84px;height:84px;border-radius:24px;background:rgba(77,107,255,.08);border:1px solid rgba(77,107,255,.35);display:flex;align-items:center;justify-content:center;color:var(--accent);margin-bottom:26px;}
.tut-step{max-width:340px;}
.tut-h{font-family:'Sora',sans-serif;font-size:27px;font-weight:700;line-height:1.15;letter-spacing:-0.02em;}
.tut-p{font-size:15px;line-height:1.55;color:var(--sub);margin-top:12px;}
.tut-dots{display:flex;gap:8px;margin-top:34px;justify-content:center;}
.tut-dot{width:8px;height:8px;border-radius:50%;background:rgba(15,23,42,.15);transition:all .3s;}
.tut-dot.on{background:#2F6BFF;width:22px;border-radius:4px;}
.tut-actions{position:absolute;bottom:calc(40px + env(safe-area-inset-bottom,0px));left:30px;right:30px;display:flex;gap:12px;align-items:center;justify-content:space-between;}
.tut-skip{background:none;border:none;color:rgba(15,23,42,.45);font:700 14px 'Inter',sans-serif;cursor:pointer;padding:10px;}
.tut-next{background:var(--grad);color:var(--accent-ink);border:none;border-radius:14px;padding:14px 28px;font:800 15px 'Inter',sans-serif;cursor:pointer;transition:transform .15s;box-shadow:0 14px 30px -14px rgba(47,107,255,.55);}
.tut-next:active{transform:scale(.96);}
.tut-fade{animation:tutFade .4s ease;}
@keyframes tutFade{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:none;}}
/* ============ INVITE ============ */
.invite-screen{position:absolute;inset:0;z-index:150;display:flex;align-items:center;justify-content:center;background:radial-gradient(130% 100% at 50% 12%,#FFFFFF 0%,#F3F5F8 52%,#F3F5F8 100%);color:#0F172A;overflow:hidden;padding:30px;}
.invite-screen .inv-card{position:relative;z-index:3;max-width:350px;text-align:center;}
.inv-mark{width:78px;height:78px;border-radius:22px;border:1px solid rgba(15,23,42,.10);display:flex;align-items:center;justify-content:center;overflow:hidden;margin:0 auto 20px;box-shadow:0 18px 44px -18px rgba(20,24,40,.2);}
.inv-mark img{width:100%;height:100%;object-fit:cover;}
.inv-tag{font-size:11px;letter-spacing:.3em;padding-left:.3em;text-transform:uppercase;color:var(--accent);font-weight:700;}
.inv-h{font-size:29px;font-weight:700;margin-top:8px;font-family:'Sora',sans-serif;letter-spacing:-0.02em;}
.inv-sub{font-size:14.5px;color:var(--sub);margin-top:10px;line-height:1.5;}
.inv-steps{margin-top:26px;text-align:left;display:flex;flex-direction:column;gap:14px;}
.inv-step{display:flex;align-items:center;gap:13px;font-size:14.5px;color:var(--ink);}
.inv-step span{width:28px;height:28px;border-radius:50%;border:1px solid #2F6BFF;color:var(--accent);display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;font-weight:700;}
.invite-screen.hide{opacity:0;transition:opacity .55s ease;}
.invite-screen .glow{top:50%;}
/* ============ GUIDED SETUP ============ */
.setup{position:absolute;inset:0;z-index:120;background:radial-gradient(130% 100% at 50% -8%,#FFFFFF 0%,#F3F5F8 52%,#F3F5F8 100%);display:flex;flex-direction:column;padding:calc(30px + env(safe-area-inset-top,0px)) 22px calc(18px + env(safe-area-inset-bottom,0px));overflow-y:auto;animation:fade .45s ease;}
.setup.hide{animation:lift .5s cubic-bezier(.6,0,.2,1) forwards;}
.setup-h{font-family:'Sora',sans-serif;font-size:26px;font-weight:700;color:var(--ink);letter-spacing:-0.02em;}
.setup-sub{font-size:14px;color:var(--sub);margin:9px 0 22px;line-height:1.55;}
.setup-list{display:flex;flex-direction:column;gap:10px;}
.setup-card{display:flex;align-items:center;gap:14px;padding:15px 16px;border-radius:16px;background:var(--surface);border:1px solid var(--line);cursor:pointer;transition:border-color .15s,background .15s,transform .08s;}
.setup-card:active{transform:scale(.99);}
.setup-card.sel{border-color:var(--accent);background:color-mix(in srgb,var(--accent) 6%,var(--surface));}
.setup-card .chip{width:42px;height:42px;border-radius:12px;background:var(--surface-2);color:var(--accent);display:flex;align-items:center;justify-content:center;flex:none;transition:.15s;}
.setup-card.sel .chip{background:var(--accent);color:var(--accent-ink);}
.setup-card .sct{flex:1;min-width:0;}
.setup-card .sct .t{font-size:15px;font-weight:600;color:var(--ink);}
.setup-card .sct .s{font-size:12.5px;color:var(--sub);margin-top:2px;}
.setup-check{width:24px;height:24px;border-radius:50%;border:1.5px solid var(--line);flex:none;display:flex;align-items:center;justify-content:center;color:#fff;background:transparent;transition:.15s;}
.setup-card.sel .setup-check{background:var(--accent);border-color:var(--accent);}
.setup-foot{margin-top:auto;padding-top:18px;display:flex;flex-direction:column;gap:11px;align-items:center;}
.setup-go{width:100%;padding:16px;border-radius:15px;border:none;background:var(--grad);color:var(--accent-ink);font:800 16px 'Inter',sans-serif;cursor:pointer;box-shadow:var(--shadow);transition:transform .15s,opacity .2s;}
.setup-go:active{transform:scale(.98);}
.setup-skip{background:none;border:none;color:var(--sub);font:600 13.5px 'Inter',sans-serif;cursor:pointer;}
.cat-add{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;max-width:520px;margin:14px auto 4px;padding:14px;border-radius:14px;border:1px dashed var(--hair);background:var(--surface);color:var(--accent);font:600 14.5px 'Inter',sans-serif;cursor:pointer;transition:background .15s,border-color .15s,transform .08s;}
.cat-add:hover{background:color-mix(in srgb,var(--accent) 5%,var(--surface));border-color:var(--accent);}
.cat-add:active{transform:scale(.99);}
.cat-empty{text-align:center;color:var(--sub);font-size:14px;margin:20px 0 4px;}
/* ============ PREMIUM MOTION ============ */
.tile.hero{position:relative;}
.skel-card{background:var(--surface);border:1px solid var(--line);border-radius:18px;padding:16px 18px;margin-bottom:14px;box-shadow:var(--shadow);}
.skel{position:relative;overflow:hidden;background:var(--surface-2);border-radius:7px;}
.skel::after{content:'';position:absolute;inset:0;transform:translateX(-100%);background:linear-gradient(90deg,transparent,color-mix(in srgb,var(--ink) 7%,transparent),transparent);animation:shimmer 1.3s infinite;}
@keyframes shimmer{to{transform:translateX(100%);}}
.skel-row{display:flex;align-items:center;gap:13px;padding:9px 0;}
.skel-dot{width:40px;height:40px;border-radius:12px;flex:none;}
.skel-line{height:12px;margin:8px 0;}
.skel-line.lg{height:15px;width:52%;margin-bottom:10px;}
.skel-line.sm{width:74%;}
.content-in>*{}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:none;}}
.row:active,.acct-item:active,.ai-chip:active,.tbtn:active,.seg-btn:active,.cat-add:active{transform:scale(.985);}
.tile.hero:active{transform:scale(.99);}
/* ============ DESKTOP ============ */
@media(min-width:900px){
  body{align-items:stretch;}
  #app{max-width:none;width:100%;border-radius:0;box-shadow:none;}
  header{padding:calc(20px + env(safe-area-inset-top,0px)) 40px 16px;}
  .screen{padding:18px 40px calc(96px + env(safe-area-inset-bottom,0px));}
  .stack,.ai-wrap,.seg{max-width:820px;margin-left:auto;margin-right:auto;width:100%;}
  .screen.is-cal{padding:calc(env(safe-area-inset-top,0px) + 10px) 32px calc(96px + env(safe-area-inset-bottom,0px));}
  .home-grid{max-width:1280px;margin:0 auto;gap:18px;}
  .tile{min-height:150px;}
}
@media(min-width:900px){.hgv{max-width:920px;margin:0 auto;}.life-wrap{grid-template-columns:repeat(3,1fr);}}


#bottomNav{position:absolute;left:0;right:0;bottom:0;z-index:30;display:none;align-items:stretch;justify-content:space-around;height:calc(62px + env(safe-area-inset-bottom,0px));padding:5px 8px 0;background:rgba(255,255,255,.88);backdrop-filter:blur(16px) saturate(1.15);-webkit-backdrop-filter:blur(16px) saturate(1.15);border-top:1px solid var(--line)}
#bottomNav.show{display:flex}
.navi{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;background:none;border:none;cursor:pointer;color:var(--faint);font-family:inherit;font-size:9.5px;font-weight:700;letter-spacing:.03em;transition:color .15s;padding:6px 2px calc(6px + env(safe-area-inset-bottom,0px))}
.navi.on{color:var(--accent)}
.navi:active{opacity:.55}
.navi svg{width:23px;height:23px;display:block}

}

.home-hero{position:relative;overflow:hidden;background:var(--surface);border:1px solid var(--line);border-radius:20px;padding:22px;box-shadow:var(--shadow-lg);cursor:pointer;transition:transform .2s}
.home-hero::before{content:"";position:absolute;inset:0;background:radial-gradient(120% 95% at 90% -25%,rgba(47,107,255,.08),transparent 52%);pointer-events:none}
.home-hero:active{transform:scale(.99)}
.brain-wrap{display:flex;flex-direction:column;gap:9px;}
.brain-card{position:relative;display:flex;align-items:flex-start;gap:11px;background:var(--surface);border:1px solid var(--line);border-radius:15px;padding:13px 14px;box-shadow:var(--shadow);animation:brainIn .42s cubic-bezier(.22,.85,.26,1) both;}
.brain-card.sev2{border-color:#F2B8B5;background:linear-gradient(0deg,#FFF7F6,var(--surface));}
.brain-card-ic{flex-shrink:0;width:30px;height:30px;border-radius:9px;display:flex;align-items:center;justify-content:center;background:var(--accent)14;color:var(--accent);}
.brain-card.sev2 .brain-card-ic{background:#E5484D1A;color:#E5484D;}
.brain-card-tx{flex:1;font-size:13.5px;line-height:1.4;color:var(--ink);}
.brain-card-act{margin-top:7px;}
.brain-card-act button{font-size:12px;font-weight:600;color:var(--accent);background:var(--accent)10;border:1px solid var(--accent)33;border-radius:8px;padding:5px 10px;cursor:pointer;}
.brain-card-go{flex-shrink:0;color:var(--sub);opacity:.6;cursor:pointer;}
@keyframes brainIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.home-hero-eye{position:relative;display:flex;align-items:center;gap:8px;font-size:11px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--accent)}
.home-hero-greet{position:relative;font-family:'Sora',sans-serif;font-size:30px;font-weight:700;letter-spacing:-.02em;line-height:1.05;margin-top:13px;color:var(--ink)}
.home-hero-sub{position:relative;font-size:14px;color:var(--sub);margin-top:9px;line-height:1.4}

.hgv{display:flex !important;flex-direction:column;gap:15px;}
.life-wrap{display:grid;grid-template-columns:1fr 1fr;gap:11px;}
.lifecard{position:relative;display:flex;flex-direction:column;background:var(--surface);border:1px solid var(--line);border-radius:18px;padding:16px;min-height:122px;cursor:pointer;transition:transform .18s,border-color .18s,box-shadow .18s;overflow:hidden;box-shadow:var(--shadow);}
.lifecard:active{transform:scale(.98);}
.lifecard.on{border-color:rgba(47,107,255,.30);}
.lifecard-chip{display:inline-flex;align-items:center;justify-content:center;width:42px;height:42px;border-radius:13px;background:var(--surface-2);border:1px solid var(--line);color:var(--sub);}
.lifecard-chip.accent{background:var(--accent-soft);border-color:rgba(47,107,255,.35);color:var(--accent);}
.lifecard-name{font-size:16.5px;font-weight:700;letter-spacing:-.01em;color:var(--ink);margin-top:15px;}
.lifecard-sub{font-size:12px;color:var(--sub);margin-top:3px;line-height:1.35;}
.lifecard-go{position:absolute;top:15px;right:13px;color:var(--faint);opacity:.55;transition:transform .22s cubic-bezier(.2,.8,.2,1),opacity .22s,color .22s;}
/* Desktop hover — real pointers only, so touch devices don't get stuck states */
@media(hover:hover) and (pointer:fine){
  .lifecard{transition:transform .24s cubic-bezier(.2,.8,.2,1),border-color .24s,box-shadow .24s;}
  .lifecard:hover{transform:translateY(-4px);box-shadow:0 22px 44px -22px rgba(15,23,42,.30),0 4px 12px -6px rgba(15,23,42,.12);border-color:rgba(47,107,255,.32);}
  .lifecard:hover .lifecard-go{transform:translateX(3px);opacity:1;color:var(--accent);}
  .lifecard:hover .lifecard-chip{transform:scale(1.04);}
  .lifecard-chip{transition:transform .24s cubic-bezier(.2,.8,.2,1);}
  .lifecard:active{transform:translateY(-1px) scale(.99);}
}
/* App Store-style shared-element zoom overlay */
.zoomclone{position:fixed;z-index:60;background:var(--surface);border:1px solid var(--line);box-shadow:var(--shadow);overflow:hidden;will-change:transform,border-radius,opacity;transform-origin:top left;pointer-events:none;}
.zoomclone.go{box-shadow:0 40px 90px -30px rgba(15,23,42,.35);}
.zoomclone-inner{position:absolute;inset:0;}
</style>
</head>
<body>
<div id="app">
  <header id="hdr"></header>
  <div id="stage"></div>

  if(!currentUser)return null;
  var ext=(file.name.split('.').pop()||'jpg').toLowerCase();
  var path=currentUser.id+'/avatar_'+Date.now()+'.'+ext;
  try{
    var up=await sb.storage.from('avatars').upload(path,file,{upsert:true,contentType:file.type});

    var pub=sb.storage.from('avatars').getPublicUrl(path);

    return url;
  }catch(e){console.error('avatar upload',e);return null;}
}

async function loadTabs(){
  _tabsCache=null;
  if(!currentUser)return;
  var raw=lsGet(tabsKey());                            // instant local fallback
  if(raw){try{var a=JSON.parse(raw);if(Array.isArray(a))_tabsCache=a;}catch(e){}}
  try{
    var r=await sb.from('settings').select('enabled_tabs').eq('user_id',currentUser.id).maybeSingle();
    if(r.data&&r.data.enabled_tabs!=null){
      var arr=typeof r.data.enabled_tabs==='string'?JSON.parse(r.data.enabled_tabs):r.data.enabled_tabs;
      if(Array.isArray(arr)){_tabsCache=arr;lsSet(tabsKey(),JSON.stringify(arr));}
    } else if(_tabsCache!==null){                       // migrate this device's choice up to the cloud
      sb.from('settings').upsert({user_id:currentUser.id,enabled_tabs:JSON.stringify(_tabsCache),updated_at:new Date().toISOString()},{onConflict:'user_id'});
    }
  }catch(e){}
}
function setEnabledTabs(a){_tabsCache=a;lsSet(tabsKey(),JSON.stringify(a));if(currentUser){sb.from('settings').upsert({user_id:currentUser.id,enabled_tabs:JSON.stringify(a),updated_at:new Date().toISOString()},{onConflict:'user_id'}).then(function(r){if(r&&r.error)toast('Cloud sync failed: '+r.error.message);}).catch(function(){toast('Cloud sync failed');});}}
// Live cross-device tab sync via Supabase Realtime
var _tabsChannel=null;
function handleSettingsChange(payload){
  try{
    var row=(payload&&(payload.new||payload.record))||null;
    if(!row||row.enabled_tabs==null)return;
    var arr=typeof row.enabled_tabs==='string'?JSON.parse(row.enabled_tabs):row.enabled_tabs;
    if(!Array.isArray(arr))return;
    var before=JSON.stringify(enabledTabs());
    _tabsCache=arr;lsSet(tabsKey(),JSON.stringify(arr));
    if(JSON.stringify(enabledTabs())===before)return;        // no real change (e.g. our own echo)
    if(typeof current!=='undefined'&&current){ if(current.tab===null)go(null,true); else refreshScreen(); }
  }catch(e){}
}
function subscribeTabs(){
  if(!currentUser||!sb.channel)return;
  if(_tabsChannel){try{sb.removeChannel(_tabsChannel);}catch(e){}_tabsChannel=null;}
  try{
    _tabsChannel=sb.channel('forge-settings-'+currentUser.id)
      .on('postgres_changes',{event:'*',schema:'public',table:'settings',filter:'user_id=eq.'+currentUser.id},handleSettingsChange)
      .subscribe();
  }catch(e){}
}

function renderPinDots(){var d=document.getElementById('pinDots');if(!d)return;d.className='dots';d.innerHTML='';for(var i=0;i<4;i++){var x=document.createElement('div');x.className='dot-pin';d.appendChild(x);}updateDots();}
function updateDots(){var d=document.getElementById('pinDots');if(!d)return;var ch=d.children;for(var i=0;i<ch.length;i++)ch[i].className='dot-pin'+(i<pinEntry.length?' on':'');}
function buildKeypad(){
  var kp=document.getElementById('keypad');if(!kp)return;kp.innerHTML='';
  ['1','2','3','4','5','6','7','8','9','','0','del'].forEach(function(k){
    var b=document.createElement('button');
    if(k===''){b.className='key blank';}
    else if(k==='del'){b.className='key fn';b.textContent='Delete';bindKey(b,pinDel);}
    else{b.className='key';b.textContent=k;bindKey(b,(function(n){return function(){pinPush(n);};})(k));}
    kp.appendChild(b);
  });
}
function bindKey(b,fn){b.addEventListener('pointerdown',function(e){e.preventDefault();fn();},{passive:false});}
// physical keyboard support for the PIN screen (desktop)
document.addEventListener('keydown',function(e){
  var kp=document.getElementById('keypad');
  if(!kp||!authEl||authEl.style.display==='none')return;                 // only when the PIN keypad is showing
  var ae=document.activeElement; if(ae&&/^(INPUT|TEXTAREA)$/.test(ae.tagName))return;  // don't hijack typed fields
  if(e.key>='0'&&e.key<='9'){e.preventDefault();pinPush(e.key);}
  else if(e.key==='Backspace'){e.preventDefault();pinDel();}
});
function pinPush(n){if(pinBusy||pinEntry.length>=4)return;pinEntry+=n;updateDots();if(pinEntry.length===4){pinBusy=true;setTimeout(pinSubmit,120);}}
function pinDel(){if(pinBusy)return;pinEntry=pinEntry.slice(0,-1);updateDots();}
function pinError(){var d=document.getElementById('pinDots');if(d)d.classList.add('err');if(navigator.vibrate)navigator.vibrate(80);setTimeout(function(){pinEntry='';pinBusy=false;if(d)d.classList.remove('err');updateDots();},440);}
async function pinSubmit(){
  if(pinMode==='set'){
    if(pinSetStage===0){
      pinSetFirst=pinEntry;pinEntry='';pinSetStage=1;pinBusy=false;
      var t=document.getElementById('spTitle'),s=document.getElementById('spSub');
      if(t)t.textContent='Confirm your PIN';if(s)s.textContent='Enter it once more to confirm.';
      updateDots();return;
    }else{
      if(pinEntry===pinSetFirst){
        var hash=await sha256hex(pinEntry);
        lsSet(pinKey(currentUser.id),hash);
        await loadTabs();enterApp(pinSetNew);
      }else{
        pinSetStage=0;pinSetFirst='';
        var t2=document.getElementById('spTitle'),s2=document.getElementById('spSub');
        if(t2)t2.textContent='Set a quick PIN';if(s2)s2.textContent='Didn\u2019t match \u2014 try again.';
        pinError();
      }
      return;
    }
  }
  // unlock mode — compare to this device's stored PIN
  var h=await sha256hex(pinEntry);
  if(currentUser&&lsGet(pinKey(currentUser.id))===h){await loadTabs();enterApp(false);}
  else{pinError();}
}

async function buildBriefing(){
  if(!currentUser)return '';
  // Prefer the brain's top insight(s) so the one-liner reflects the same engine.
  try{
    var ins=await brainInsights();
    if(ins&&ins.length){
      var lead=ins.filter(function(x){return x.sev>=1;}).slice(0,2).map(function(x){return x.text.replace(/\s+/g,' ');});
      if(lead.length)return lead.join('   ·   ');
    }
  }catch(e){}
  var parts=[];
  try{
    var wantTasks=enabledTabs().indexOf('work')>=0;
    var res=await Promise.all([getCountdowns(),getMeals(),wantTasks?loadItems('work'):Promise.resolve([])]);
    var cds=res[0]||[],meals=res[1]||{},tasks=res[2]||[];
    var today=new Date();today.setHours(0,0,0,0);
    var soon=null,sd=null;
    cds.forEach(function(c){if(!c.d)return;var dt=new Date(c.d+'T00:00:00');if(isNaN(dt.getTime()))return;var days=Math.round((dt-today)/86400000);if(days>=0&&(sd===null||days<sd)){sd=days;soon=c;}});

function zoomTo(cardEl,tab){

    var appEl=document.getElementById('app');
    if(reduce||!cardEl||!appEl){go(tab);return;}
    var r=cardEl.getBoundingClientRect();

    var clone=document.createElement('div');

    clone.style.left=r.left+'px';clone.style.top=r.top+'px';
    clone.style.width=r.width+'px';clone.style.height=r.height+'px';
    clone.style.borderRadius=startRad+'px';

    var dx=ar.left-r.left, dy=ar.top-r.top;

        clone.style.transform='translate('+dx+'px,'+dy+'px) scale('+sx+','+sy+')';
        clone.style.borderRadius=(startRad/Math.max(sx,sy))+'px';

  function end(e){if(!dragging||!secEl||!homeEl){secEl=null;homeEl=null;dragging=false;decided=false;return;}var t=(e.changedTouches?e.changedTouches[0]:e);var dx=Math.max(0,t.clientX-startX);var s=secEl,hm=homeEl,EASE='transform .4s cubic-bezier(.22,.85,.26,1)';s.classList.remove('dragging');hm.classList.remove('dragging');if(dx>W*0.30){s.style.transition=EASE;s.style.transform='translateX(100%)';hm.classList.remove('enter-left');hm.style.transition=EASE+',filter .4s ease';hm.style.transform='translateX(0)';hm.style.filter='none';var fin=function(){if(s&&s.parentNode)s.parentNode.removeChild(s);hm.classList.add('show');hm.style.transition='';hm.style.transform='';hm.style.filter='';};s.addEventListener('transitionend',fin,{once:true});setTimeout(fin,520);activeTab=parent;current={tab:parent,el:hm};backTarget=null;manageFab(parent);renderHeader(parent);}else{s.style.transition=EASE;s.style.transform='translateX(0)';var rem=function(){if(hm&&hm.parentNode)hm.parentNode.removeChild(hm);s.style.transition='';s.style.transform='';};s.addEventListener('transitionend',rem,{once:true});setTimeout(rem,520);renderHeader(activeTab);}secEl=null;homeEl=null;dragging=false;decided=false;}
  var st=document.getElementById('stage');

// ============================================================
// TRACKER ENGINE — log a daily number + note → chart, trend, AI insight.
// Reused by Mood, Sleep (and any future daily metric).
// ============================================================
var TRACKERS={
  mood:{label:'Mood',max:10,suffix:' /10',q:'How was today, out of 10?',noteLabel:'What shaped it?',color:'#FB923C'},
  sleep:{label:'Sleep score',max:100,suffix:'',q:'Last night\u2019s sleep score (0\u2013100)',noteLabel:'Notes (bedtime, wake-ups\u2026)',color:'#818CF8'}
};
function localDay(){var d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function trackerChart(points,max,color){
  if(!points.length)return '<div class="rs" style="padding:18px 0;text-align:center">Log a few days to see your trend.</div>';
  var W=300,H=92,pad=8,n=points.length,step=n>1?(W-2*pad)/(n-1):0;
  var pts=points.map(function(p,i){var x=pad+(n>1?i*step:(W/2-pad));var y=H-pad-((Math.max(0,Math.min(max,p.value))/max)*(H-2*pad));return{x:x,y:y};});
  var line=pts.map(function(p,i){return (i?'L':'M')+p.x.toFixed(1)+' '+p.y.toFixed(1);}).join(' ');
  var dots=pts.map(function(p){return '<circle cx="'+p.x.toFixed(1)+'" cy="'+p.y.toFixed(1)+'" r="2.6" fill="'+color+'"/>';}).join('');
  var lastX=pts[pts.length-1].x;
  var area=(n>1?('M'+pts[0].x.toFixed(1)+' '+(H-pad)+' '+pts.map(function(p){return 'L'+p.x.toFixed(1)+' '+p.y.toFixed(1);}).join(' ')+' L'+lastX.toFixed(1)+' '+(H-pad)+' Z'):'');
  return '<svg viewBox="0 0 '+W+' '+H+'" width="100%" height="'+H+'" preserveAspectRatio="none" style="display:block;overflow:visible">'+(area?'<path d="'+area+'" fill="'+color+'" opacity="0.10"/>':'')+'<path d="'+line+'" fill="none" stroke="'+color+'" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>'+dots+'</svg>';
}
async function renderTracker(kind){
  var cfg=TRACKERS[kind];
  var logs=await getTrackerLogs(kind,30);
  var asc=logs.slice().reverse();
  var today=localDay();
  var todayLog=logs.filter(function(l){return l.day===today;})[0];
  var vals=logs.map(function(l){return l.value;});
  var avg=vals.length?vals.reduce(function(a,b){return a+b;},0)/vals.length:0;
  function mean(a){return a.length?a.reduce(function(s,x){return s+x.value;},0)/a.length:0;}
  var last7=logs.slice(0,7),prev7=logs.slice(7,14),tr=mean(last7)-mean(prev7);
  var trTxt=prev7.length?(tr>0.3?'\u25B2 trending up':tr<-0.3?'\u25BC trending down':'\u2192 steady'):'';
  var head='<div class="card dark"><div class="small">'+esc(cfg.label)+(todayLog?' \u00B7 today':'')+'</div><div class="serif" style="font-size:40px;font-weight:600;margin-top:2px">'+(todayLog?todayLog.value+cfg.suffix:'\u2014')+'</div><div style="font-size:13px;opacity:.85;margin-top:4px">'+(vals.length?'avg '+avg.toFixed(1)+cfg.suffix+(trTxt?' \u00B7 '+trTxt:''):'No entries yet')+'</div></div>';
  var logBtn='<button class="reqbtn" onclick="logTracker(\''+kind+'\')">'+icon('plus',16)+' '+(todayLog?'Update today':'Log today')+'</button>';
  var chart='<div class="card"><div class="ctitle">Trend</div>'+trackerChart(asc.map(function(l){return{day:l.day,value:l.value};}),cfg.max,cfg.color)+'</div>';
  var insight=logs.length?'<div class="card" id="trkInsight" style="display:flex;align-items:center;gap:12px"><div class="chip sm" style="--tc:'+cfg.color+'">'+icon('spark',16,2.2)+'</div><div style="flex:1"><div class="rt">Forge AI insight</div><div class="rs">What\u2019s driving your '+esc(cfg.label.toLowerCase())+'?</div></div><button class="tbtn add" onclick="trackerInsight(\''+kind+'\')">Ask</button></div>':'';
  var recent=logs.slice(0,12).map(function(l){var d=new Date(l.day+'T00:00:00');var ds=d.toLocaleDateString(undefined,{weekday:'short',day:'numeric',month:'short',year:'numeric'});return '<div class="row"><div style="flex:1"><div class="rt">'+l.value+cfg.suffix+'  <span class="rs" style="font-weight:400">'+ds+'</span></div>'+(l.note?'<div class="rs">'+esc(l.note)+'</div>':'')+'</div><button class="del" onclick="delTracker(\''+l.id+'\')">'+icon('x',13)+'</button></div>';}).join('');
  var list=logs.length?'<div class="card"><div class="ctitle">History</div>'+recent+'</div>':'';
  return '<div class="stack">'+head+logBtn+chart+insight+list+'</div>';
}

  var cfg=TRACKERS[kind];
  openForm(cfg.q,'',[{key:'v',label:'Number (0\u2013'+cfg.max+')',numeric:true},{key:'note',label:cfg.noteLabel}],async function(v){
    var val=parseFloat(v.v);if(isNaN(val)){toast('Enter a number');return;}
    val=Math.max(0,Math.min(cfg.max,val));

// Dated, unfinished tasks also surface on the Calendar.

var todoView='short';
function todoSetView(v){if(v===todoView)return;todoView=v;todoAnim=1;refreshScreen();}
var todoAnim=0;
async function getTodos(){if(!currentUser)return[];try{var r=await sb.from('todos').select('*').eq('user_id',currentUser.id).order('done').order('due',{nullsFirst:false}).order('created_at');if(r.error)throw r.error;return r.data||[];}catch(e){return [];}}
async function addTodo(text,term,due){var r=await sb.from('todos').insert({user_id:currentUser.id,text:text,term:term||'short',due:due||null,done:false});if(r.error)throw r.error;}
async function setTodo(id,patch){var r=await sb.from('todos').update(patch).eq('id',id);if(r.error)throw r.error;}
async function delTodo(id){var r=await sb.from('todos').delete().eq('id',id);if(r.error)throw r.error;}

function todoFmtDue(d){if(!d)return'';var dt=new Date(d+'T00:00:00');var t=new Date();t.setHours(0,0,0,0);var diff=Math.round((dt-t)/86400000);if(diff===0)return'Today';if(diff===1)return'Tomorrow';if(diff===-1)return'Yesterday';if(diff>1&&diff<7)return dt.toLocaleDateString(undefined,{weekday:'long'});return dt.toLocaleDateString(undefined,{day:'numeric',month:'short'});}
function todoOverdue(t){if(!t.due||t.done)return false;var dt=new Date(t.due+'T00:00:00');var d=new Date();d.setHours(0,0,0,0);return dt<d;}

async function renderTodo(){
  if(!currentUser)return '<div class="card"><div class="rs">Sign in to use your lists.</div></div>';
  var all=await getTodos();
  var active=all.filter(function(t){return t.term===todoView&&!t.done;});
  var done=all.filter(function(t){return t.term===todoView&&!!t.done;});
  var seg='<div class="td-seg">'+[['short','Short term'],['long','Long term']].map(function(p){return '<button class="'+(todoView===p[0]?'on':'')+'" onclick="todoSetView(\''+p[0]+'\')">'+p[1]+'</button>';}).join('')+'</div>';
  var add='<div class="td-add"><input id="tdAdd" placeholder="Add a '+(todoView==='short'?'task':'goal')+'\u2026" onkeydown="if(event.key===\'Enter\')todoQuickAdd()" autocomplete="off"/><button class="td-addbtn" onclick="todoQuickAdd()">'+icon('plus',18,2.6)+'</button></div>';
  var row=function(t){
    var due=t.due?('<span class="td-due'+(todoOverdue(t)?' over':'')+'">'+icon('clock',11,2.4)+todoFmtDue(t.due)+'</span>'):'';
    return '<div class="td-row'+(t.done?' done':'')+'"><button class="td-check'+(t.done?' on':'')+'" onclick="todoToggle(\''+t.id+'\','+(t.done?'false':'true')+')">'+(t.done?icon('check',13,3):'')+'</button><div class="td-main" onclick="tdEdit(\''+t.id+'\')"><div class="td-text">'+esc(t.text)+'</div>'+due+'</div></div>';
  };
  var list=active.length?active.map(row).join(''):'<div class="td-empty">'+(todoView==='short'?'Nothing on your short list. Add something above.':'No long-term goals yet \u2014 dream big.')+'</div>';
  var doneBlock=done.length?'<div class="td-done-head">Completed \u00b7 '+done.length+'</div><div class="cal-card td-card">'+done.map(row).join('')+'</div>':'';
  var cls=todoAnim?' td-anim':'';todoAnim=0;
  return todoCSS()+'<div class="stack" style="padding-bottom:40px">'+seg+add+'<div class="cal-card td-card'+cls+'">'+list+'</div>'+doneBlock+'</div>';
}

async function todoQuickAdd(){
  var el=document.getElementById('tdAdd');var v=(el&&el.value||'').trim();if(!v)return;
  el.value='';
  try{await addTodo(v,todoView,null);todoAnim=1;await refreshScreen();var n=document.getElementById('tdAdd');if(n)n.focus();}catch(e){toast('Couldn\u2019t save \u2014 run the todos SQL once');}
}
async function todoToggle(id,to){try{await setTodo(id,{done:(to==='true'||to===true)});}catch(e){}await refreshScreen();}
function tdEdit(id){
  getTodos().then(function(all){
    var t=null;for(var i=0;i<all.length;i++)if(all[i].id===id)t=all[i];if(!t)return;
    var o=document.createElement('div');o.className='overlay';o.id='ovl';o.onclick=closeOverlay;
    o.innerHTML='<div class="sheet" onclick="event.stopPropagation()">'+todoCSS()+'<h3>Edit</h3>'+

// ============================================================
// PASSWORDS — a real encrypted vault. AES-GCM + PBKDF2 (Web
// Crypto). The server only ever sees ciphertext; the master
// password never leaves the device and is never stored.
// ============================================================
var pwKey=null;            // in-memory CryptoKey when unlocked (null = locked)
var pwReveal={};           // entry id -> revealed bool (for the open sheet)
var PW_VERIFY='forge-vault-v1';

function pwBufToB64(buf){var b=new Uint8Array(buf),s='';for(var i=0;i<b.length;i++)s+=String.fromCharCode(b[i]);return btoa(s);}
function pwB64ToBuf(b64){var s=atob(b64),b=new Uint8Array(s.length);for(var i=0;i<s.length;i++)b[i]=s.charCodeAt(i);return b.buffer;}
async function pwDeriveKey(master,saltBuf){
  var base=await crypto.subtle.importKey('raw',new TextEncoder().encode(master),'PBKDF2',false,['deriveKey']);
  return crypto.subtle.deriveKey({name:'PBKDF2',salt:saltBuf,iterations:160000,hash:'SHA-256'},base,{name:'AES-GCM',length:256},false,['encrypt','decrypt']);
}
async function pwEnc(key,plain){var iv=crypto.getRandomValues(new Uint8Array(12));var ct=await crypto.subtle.encrypt({name:'AES-GCM',iv:iv},key,new TextEncoder().encode(plain));return {iv:pwBufToB64(iv),cipher:pwBufToB64(ct)};}
async function pwDec(key,ivB64,cipherB64){var pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:new Uint8Array(pwB64ToBuf(ivB64))},key,pwB64ToBuf(cipherB64));return new TextDecoder().decode(pt);}

// ---- vault meta (salt + verifier) ----
async function pwGetVault(){if(!currentUser)return null;try{var r=await sb.from('vault').select('*').eq('user_id',currentUser.id).maybeSingle();if(r.error)throw r.error;return r.data||null;}catch(e){return null;}}
async function pwCreateVault(master){
  var saltB=crypto.getRandomValues(new Uint8Array(16));
  var key=await pwDeriveKey(master,saltB.buffer);
  var v=await pwEnc(key,PW_VERIFY);
  var r=await sb.from('vault').insert({user_id:currentUser.id,salt:pwBufToB64(saltB.buffer),v_iv:v.iv,v_cipher:v.cipher});
  if(r.error)throw r.error;
  pwKey=key;
}
async function pwUnlock(master,row){
  var key=await pwDeriveKey(master,pwB64ToBuf(row.salt));
  var ok=false;try{ok=(await pwDec(key,row.v_iv,row.v_cipher))===PW_VERIFY;}catch(e){ok=false;}
  if(!ok)throw new Error('wrong');
  pwKey=key;
}
function pwLock(){pwKey=null;pwReveal={};refreshScreen();}

// ---- entries ----
async function pwList(){if(!currentUser)return[];try{var r=await sb.from('passwords').select('id,label,url,iv,cipher,created_at').eq('user_id',currentUser.id).order('label');if(r.error)throw r.error;return r.data||[];}catch(e){return [];}}
async function pwSave(o){var blob=JSON.stringify({u:o.username||'',p:o.password||'',n:o.notes||''});var c=await pwEnc(pwKey,blob);var r=await sb.from('passwords').insert({user_id:currentUser.id,label:o.label,url:o.url||'',iv:c.iv,cipher:c.cipher});if(r.error)throw r.error;}
async function pwDelete(id){var r=await sb.from('passwords').delete().eq('id',id);if(r.error)throw r.error;}
function pwGenerate(len){len=len||18;var U='ABCDEFGHJKLMNPQRSTUVWXYZ',L='abcdefghijkmnpqrstuvwxyz',D='23456789',S='!@#$%^&*-_=+';var all=U+L+D+S;var a=crypto.getRandomValues(new Uint32Array(len));var out=[U[a[0]%U.length],L[a[1]%L.length],D[a[2]%D.length],S[a[3]%S.length]];for(var i=4;i<len;i++)out.push(all[a[i]%all.length]);for(var j=out.length-1;j>0;j--){var k=a[j]%(j+1);var t=out[j];out[j]=out[k];out[k]=t;}return out.join('');}

async function renderPasswords(){
  if(!currentUser)return '<div class="card"><div class="rs">Sign in to use the vault.</div></div>';
  // UNLOCKED
  if(pwKey){
    var entries=await pwList();
    var rows=entries.length?entries.map(function(e){
      var letter=(e.label||'?').trim().charAt(0).toUpperCase();
      return '<div class="pw-row" onclick="pwOpen(\''+e.id+'\')"><div class="pw-ico">'+esc(letter)+'</div><div class="pw-main"><div class="pw-label">'+esc(e.label)+'</div>'+(e.url?'<div class="pw-sub">'+esc(e.url)+'</div>':'')+'</div><div class="pw-dots">\u2022\u2022\u2022\u2022\u2022\u2022</div>'+icon('chev',16,2.4)+'</div>';
    }).join(''):'<div class="rs" style="padding:14px 2px;text-align:center">No saved logins yet. Tap + to add one.</div>';
    return pwCSS()+'<div class="stack" style="padding-bottom:90px"><div class="pw-bar"><div class="pw-bar-l">'+icon('shield',16,2.2)+' <span>Vault unlocked</span></div><button class="pw-lock" onclick="pwLock()">'+icon('padlock',14,2.4)+' Lock</button></div><div class="cal-card" style="padding:6px 14px">'+rows+'</div><button class="pw-fab" onclick="pwAddSheet()" aria-label="Add login">'+icon('plus',24,2.6)+'</button></div>';
  }
  // LOCKED — decide create vs unlock
  var vault=await pwGetVault();
  if(vault){
    return pwCSS()+'<div class="stack"><div class="pw-hero"><div class="pw-hero-ico">'+icon('padlock',30,2.2)+'</div><div class="pw-hero-t">Vault locked</div><div class="pw-hero-s">Enter your master password to unlock your saved logins.</div><input class="pw-field" id="pwMaster" type="password" placeholder="Master password" autocomplete="off" onkeydown="if(event.key===\'Enter\')pwDoUnlock()"/><button class="btn btn-primary pw-go" onclick="pwDoUnlock()">Unlock</button><div class="pw-note">'+icon('shield',13,2.2)+' Everything is encrypted on your device. We can\u2019t see your passwords \u2014 and if you forget the master password, they can\u2019t be recovered.</div></div></div>';
  }
  return pwCSS()+'<div class="stack"><div class="pw-hero"><div class="pw-hero-ico">'+icon('shield',30,2.2)+'</div><div class="pw-hero-t">Create your vault</div><div class="pw-hero-s">Pick a master password. It encrypts everything and is never stored \u2014 so choose something strong you won\u2019t forget.</div><input class="pw-field" id="pwNew1" type="password" placeholder="Master password (10+ characters)" autocomplete="off"/><input class="pw-field" id="pwNew2" type="password" placeholder="Confirm master password" autocomplete="off" onkeydown="if(event.key===\'Enter\')pwDoCreate()"/><button class="btn btn-primary pw-go" onclick="pwDoCreate()">Create vault</button><div class="pw-note">'+icon('shield',13,2.2)+' Encrypted with AES-256 on your device. If you lose this password there is no reset \u2014 that\u2019s what keeps it private.</div></div></div>';
}
