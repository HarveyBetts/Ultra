// ============================================================
// CALENDAR — Apple-style, in Forge's skin. Year / Month / Week
// / Day / Agenda. Everything is cached in memory so moving
// through time is instant; Day & Week show a full scrollable
// 24-hour grid that opens at the current time.
// ============================================================
var calView='month', calCursor=null, calAnim='';
var CAL_HH_DAY=52, CAL_HH_WEEK=44, CAL_PAD=8;
var _calKeepScroll=null;
function calPad(n){return (n<10?'0':'')+n;}
function calISO(d){return d.getFullYear()+'-'+calPad(d.getMonth()+1)+'-'+calPad(d.getDate());}
function calCur(){var d=calCursor?new Date(calCursor):new Date();return new Date(d.getFullYear(),d.getMonth(),d.getDate());}
function calToday(){calCursor=new Date();calAnim='pop';_calKeepScroll=null;refreshScreen();}
function calSetView(v){if(v===calView)return;var ladder=['year','month','week','day'];var a=ladder.indexOf(v),b=ladder.indexOf(calView);calAnim=(a>=0&&b>=0)?(a>b?'zoomin':'zoomout'):'fade';calView=v;_calKeepScroll=null;refreshScreen();}
function calNav(n){var cb=document.getElementById('calBody');if(cb&&cb._busy)return;if(cb){calBuildTrack();calCommitTrack(n>0?1:-1);return;}var d=calCur();if(calView==='year')d=new Date(d.getFullYear()+n,d.getMonth(),1);else if(calView==='month')d=new Date(d.getFullYear(),d.getMonth()+n,1);else if(calView==='week')d.setDate(d.getDate()+7*n);else d.setDate(d.getDate()+n);calCursor=d;calAnim=n>0?'next':'prev';refreshScreen();}
function calZoom(dir){var ladder=['year','month','week','day'];var i=ladder.indexOf(calView);if(i<0)i=1;var ni=Math.max(0,Math.min(3,i+dir));if(ni===i)return;calView=ladder[ni];calAnim=dir>0?'zoomin':'zoomout';_calKeepScroll=null;refreshScreen();}
function calGoDay(iso){calCursor=new Date(iso+'T00:00:00');calView='day';calAnim='zoomin';_calKeepScroll=null;refreshScreen();}
function calGoMonth(y,mo){calCursor=new Date(y,mo,1);calView='month';calAnim='zoomin';_calKeepScroll=null;refreshScreen();}
function calPickDay(iso){var nd=new Date(iso+'T00:00:00');var cur=calCur();calAnim=nd>cur?'next':(nd<cur?'prev':'fade');calCursor=nd;calView='day';_calKeepScroll=null;refreshScreen();}
var CAL_COL={work:'#2F6BFF',meeting:'#6366F1',appointment:'#0EA5E9',social:'#EC4899',health:'#16A34A',personal:'#7C5CFF',due:'#F59E0B',home:'#14B8A6',todo:'#6366F1',other:'#647084'};
function calColor(t){return CAL_COL[t]||CAL_COL.other;}
function calHM(t){if(!t||!/^\d{1,2}:\d{2}/.test(t))return null;var p=t.split(':');return (+p[0])+(+p[1])/60;}
function calHourLbl(h){return calPad(h)+':00';}

// ---- gestures (attached once; act only on the calendar) ----
var _calGest=false;
function calInitGestures(){
  if(_calGest)return; _calGest=true;
  var sx=0,sy=0,st=0,d0=0,mode='',decided=false,pinchDone=false;
  function dist(t){return Math.hypot(t[0].clientX-t[1].clientX,t[0].clientY-t[1].clientY);}
  document.addEventListener('touchstart',function(e){
    if(activeTab!=='calendar')return;
    if(e.touches.length===2){mode='pinch';d0=dist(e.touches);pinchDone=false;return;}
    if(e.touches.length===1){var t=e.touches[0];if(t.clientX<28){mode='';return;}var cb=document.getElementById('calBody');if(cb&&cb._busy){mode='';return;}sx=t.clientX;sy=t.clientY;st=Date.now();mode='swipe';decided=false;}
  },{passive:true});
  document.addEventListener('touchmove',function(e){
    if(activeTab!=='calendar')return;
    if(mode==='pinch'&&e.touches.length===2){if(pinchDone)return;var r=dist(e.touches)/(d0||1);if(r>1.3){pinchDone=true;calZoom(1);}else if(r<0.72){pinchDone=true;calZoom(-1);}return;}
    if(mode==='swipe'&&e.touches.length===1){
      var t=e.touches[0];var dx=t.clientX-sx,dy=t.clientY-sy;
      if(!decided){if(Math.abs(dx)<10&&Math.abs(dy)<10)return;decided=true;if(Math.abs(dx)<=Math.abs(dy)*1.25){mode='';return;}calBuildTrack();}
      if(e.cancelable)e.preventDefault();
      var cb=document.getElementById('calBody');
      if(cb&&cb._track){var x=-cb._W+dx;cb._track.style.transition='';cb._track.style.transform='translate3d('+x+'px,0,0)';}
    }
  },{passive:false});
  document.addEventListener('touchend',function(e){
    if(mode==='swipe'&&decided){
      var cb=document.getElementById('calBody');
      if(cb&&cb._track){
        var t=e.changedTouches&&e.changedTouches[0];var dx=t?t.clientX-sx:0;var dt=Date.now()-st;var fast=dt<260&&Math.abs(dx)>26;var thr=Math.min(cb._W*0.24,72);
        if(dx<-thr||(fast&&dx<-8))calCommitTrack(1);
        else if(dx>thr||(fast&&dx>8))calCommitTrack(-1);
        else calCancelTrack();
      }
    }
    mode='';decided=false;
  },{passive:true});
}
function calShiftDate(d,n){var x=new Date(d);if(calView==='year')x=new Date(x.getFullYear()+n,x.getMonth(),1);else if(calView==='month')x=new Date(x.getFullYear(),x.getMonth()+n,1);else if(calView==='week')x.setDate(x.getDate()+7*n);else x.setDate(x.getDate()+n);return x;}
function calViewHTML(){return calView==='year'?calYearView():calView==='week'?calWeekView():calView==='day'?calDayView():calView==='agenda'?calAgendaView():calMonthView();}
function calBuildTrack(){
  var cb=document.getElementById('calBody');if(!cb||cb._track)return cb;
  var W=cb.clientWidth||window.innerWidth||390;var save=calCursor;
  calCursor=calShiftDate(save,-1);var prevH=calViewHTML();
  calCursor=calShiftDate(save,1);var nextH=calViewHTML();
  calCursor=save;
  var cur=document.createElement('div');cur.className='cal-pane';cur.style.width=W+'px';
  while(cb.firstChild)cur.appendChild(cb.firstChild);
  var prev=document.createElement('div');prev.className='cal-pane';prev.style.width=W+'px';prev.innerHTML=prevH;
  var next=document.createElement('div');next.className='cal-pane';next.style.width=W+'px';next.innerHTML=nextH;
  var track=document.createElement('div');track.className='cal-track';
  track.appendChild(prev);track.appendChild(cur);track.appendChild(next);
  cb.appendChild(track);cb._track=track;cb._W=W;cb._panes={prev:prev,cur:cur,next:next};
  track.style.transform='translate3d('+(-W)+'px,0,0)';
  var cs=cur.querySelector('.cal-scroll');
  if(cs){var tp=cs.scrollTop;var ps=prev.querySelector('.cal-scroll');var ns=next.querySelector('.cal-scroll');if(ps)ps.scrollTop=tp;if(ns)ns.scrollTop=tp;}
  [prev,cur,next].forEach(function(p){var s=p.querySelector('.cal-scroll');if(s)s.classList.add('cal-scroll-ready');});
  return cb;
}
function _calSettle(cb,tgt){var frag=document.createDocumentFragment();while(tgt.firstChild)frag.appendChild(tgt.firstChild);cb._track=null;cb._panes=null;cb._busy=false;cb.innerHTML='';cb.appendChild(frag);}
function calCommitTrack(dir){
  var cb=document.getElementById('calBody');if(!cb||!cb._track||cb._busy)return;var W=cb._W,track=cb._track;cb._busy=true;
  track.style.transition='transform .3s cubic-bezier(.22,.61,.36,1)';track.style.transform='translate3d('+(dir>0?-2*W:0)+'px,0,0)';
  var done=false;var fin=function(){if(done)return;done=true;track.removeEventListener('transitionend',fin);calCursor=calShiftDate(calCursor,dir);_calSettle(cb,dir>0?cb._panes.next:cb._panes.prev);};
  track.addEventListener('transitionend',fin);setTimeout(fin,370);
}
function calCancelTrack(){
  var cb=document.getElementById('calBody');if(!cb||!cb._track||cb._busy)return;var W=cb._W,track=cb._track;cb._busy=true;
  track.style.transition='transform .26s cubic-bezier(.22,.61,.36,1)';track.style.transform='translate3d('+(-W)+'px,0,0)';
  var done=false;var fin=function(){if(done)return;done=true;track.removeEventListener('transitionend',fin);_calSettle(cb,cb._panes.cur);};
  track.addEventListener('transitionend',fin);setTimeout(fin,320);
}

// ---- in-memory cache: the reason transitions are now instant ----
var calCache={loaded:false,sh:[],ev:[],td:[],up:[]};
async function calEnsure(){
  if(calCache.loaded)return;
  function safe(p){return Promise.resolve(p).then(function(v){return v||[];}).catch(function(){return [];});}
  var r=await Promise.all([safe(getShifts()),safe(getEvents()),safe(typeof getTodos==='function'?getTodos():[]),safe(typeof getUpkeep==='function'?getUpkeep():[])]);
  calCache.sh=r[0];calCache.ev=r[1];calCache.td=r[2];calCache.up=r[3];calCache.loaded=true;
}
function calInvalidate(){calCache.loaded=false;}

// ---- events data (write-through: invalidate the cache on change) ----
async function getEvents(fromISO,toISO){if(!currentUser)return[];try{var q=sb.from('events').select('*').eq('user_id',currentUser.id);if(fromISO)q=q.gte('date',fromISO);if(toISO)q=q.lte('date',toISO);var r=await q.order('date');if(r.error)throw r.error;return (r.data||[]).map(function(x){return{id:x.id,date:x.date,title:x.title||'',start:x.start_t||'',end:x.end_t||'',allDay:!!x.all_day,type:x.type||'other',location:x.location||'',note:x.note||''};});}catch(e){return [];}}
async function saveEvent(o){if(!currentUser)return;var r=await sb.from('events').insert({user_id:currentUser.id,date:o.date,title:o.title,start_t:o.start||null,end_t:o.end||null,all_day:!!o.allDay,type:o.type||'other',location:o.location||null,note:o.note||null});if(r.error)throw r.error;calInvalidate();}
async function deleteEvent(id){var r=await sb.from('events').delete().eq('id',id);if(r.error)throw r.error;calInvalidate();}

// ---- aggregate from cache — SYNCHRONOUS, no network on transitions ----
function calItems(fromISO,toISO){
  var out=[];
  calCache.sh.forEach(function(s){if(s.day>=fromISO&&s.day<=toISO)out.push({date:s.day,title:s.label||'Shift',start:s.start||'',end:s.end||'',allDay:!s.start,type:'work',kind:'shift',color:calColor('work'),sub:(s.start?(s.start+(s.end?' \u2013 '+s.end:'')):'Shift'),id:'s:'+s.id});});
  calCache.ev.forEach(function(e){if(e.date>=fromISO&&e.date<=toISO)out.push({date:e.date,title:e.title,start:e.start,end:e.end,allDay:e.allDay||!e.start,type:e.type,kind:'event',color:calColor(e.type),sub:e.location||(e.start?(e.start+(e.end?' \u2013 '+e.end:'')):'All day'),id:'e:'+e.id,rid:e.id});});
  calCache.up.forEach(function(a){(a.tasks||[]).forEach(function(t){if(t.next&&t.next>=fromISO&&t.next<=toISO)out.push({date:t.next,title:t.name,start:'',end:'',allDay:true,type:'home',kind:'upkeep',color:calColor('home'),sub:'Upkeep \u00B7 '+a.name,id:'u:'+a.id});});});
  calCache.td.forEach(function(t){if(t.due&&!t.done&&t.due>=fromISO&&t.due<=toISO)out.push({date:t.due,title:t.text,start:'',end:'',allDay:true,type:'todo',kind:'todo',color:calColor('todo'),sub:(t.term==='long'?'Goal':'To-do'),id:'t:'+t.id});});
  return out;
}
function calByDay(items){var m={};items.forEach(function(it){(m[it.date]=m[it.date]||[]).push(it);});return m;}
function calSort(a,b){return (a.allDay?0:1)-(b.allDay?0:1)||(calHM(a.start)||0)-(calHM(b.start)||0);}
function calLayout(evs){evs=evs.slice().sort(function(a,b){return a.s-b.s||a.e-b.e;});var i=0;while(i<evs.length){var cl=[evs[i]];var mx=evs[i].e;var j=i+1;while(j<evs.length&&evs[j].s<mx-0.001){cl.push(evs[j]);mx=Math.max(mx,evs[j].e);j++;}var lanes=[];cl.forEach(function(ev){var pl=false;for(var k=0;k<lanes.length;k++){if(ev.s>=lanes[k]-0.001){ev.lane=k;lanes[k]=ev.e;pl=true;break;}}if(!pl){ev.lane=lanes.length;lanes.push(ev.e);}});var tot=lanes.length;cl.forEach(function(ev){ev.lanes=tot;});i=j;}return evs;}

function calHeader(title){return '<div class="cal-head"><div class="cal-title" onclick="calZoom(-1)">'+title+'<span class="cal-title-chev">'+icon('chev',13,2.6)+'</span></div><div class="cal-navbtns"><button class="cal-today" onclick="calToday()">Today</button><button class="cal-nb" onclick="calNav(-1)">'+icon('back',15,2.4)+'</button><button class="cal-nb" onclick="calNav(1)">'+icon('chev',15,2.4)+'</button></div></div>';}
function calAddFab(){return '<button class="cal-fab" onclick="calAddEvent()" aria-label="Add event">'+icon('plus',24,2.6)+'</button>';}

function calStyleInject(){try{if(document.getElementById('forgeCalStyle'))return;var s=document.createElement('style');s.id='forgeCalStyle';s.textContent=calCSS();(document.head||document.documentElement).appendChild(s);}catch(e){}}
async function renderCalendar(){
  calInitGestures();
  await calEnsure();
  calStyleInject();
  var seg='<div class="cal-seg">'+['month','week','day','agenda'].map(function(v){return '<button class="'+(calView===v?'on':'')+'" onclick="calSetView(\''+v+'\')">'+v.charAt(0).toUpperCase()+v.slice(1)+'</button>';}).join('')+'</div>';
  var body;
  try{
    if(calView==='year')body=calYearView();
    else if(calView==='week')body=calWeekView();
    else if(calView==='day')body=calDayView();
    else if(calView==='agenda')body=calAgendaView();
    else body=calMonthView();
  }catch(e){body='<div class="card"><div class="rs">Calendar hiccup \u2014 '+esc(String(e&&e.message||e))+'</div></div>';}
  var a=calAnim;calAnim='';
  var cls={zoomin:'cal-zin',zoomout:'cal-zout',next:'cal-next',prev:'cal-prev',pop:'cal-pop',fade:'cal-fade'}[a]||'';
  if(typeof requestAnimationFrame==='function')requestAnimationFrame(function(){requestAnimationFrame(calAfterRender);});
  return '<div class="stack" style="padding-bottom:90px">'+seg+'<div id="calBody" class="'+cls+'">'+body+'</div>'+calAddFab()+'</div>';

function calSaveScroll(){if(calView==='day'||calView==='week'){var sc=document.querySelector('.cal-scroll');if(sc)_calKeepScroll=sc.scrollTop;}}
function calWeekHasToday(c){var dow=(c.getDay()+6)%7;var mon=new Date(c.getFullYear(),c.getMonth(),c.getDate()-dow);var t=new Date();t.setHours(0,0,0,0);return t>=mon&&t<new Date(mon.getFullYear(),mon.getMonth(),mon.getDate()+7);}
function calAfterRender(){
  if(activeTab!=='calendar')return;
  var sc=document.querySelector('.cal-scroll');if(!sc)return;
  var reveal=function(){sc.classList.add('cal-scroll-ready');};
  if(_calKeepScroll!=null){sc.scrollTop=_calKeepScroll;_calKeepScroll=null;reveal();return;}
  if(calView!=='day'&&calView!=='week'){reveal();return;}
  var HH=calView==='day'?CAL_HH_DAY:CAL_HH_WEEK;
  var c=calCur();var inToday=calView==='day'?(calISO(c)===calISO(new Date())):calWeekHasToday(c);
  var now=new Date();var h=now.getHours()+now.getMinutes()/60;
  var hr=inToday?Math.max(0,h-1):7;
  sc.scrollTop=Math.round(CAL_PAD+hr*HH-6);
  reveal();
}

function calYearView(){
  var c=calCur();var y=c.getFullYear();
  var byDay=calByDay(calItems(y+'-01-01',y+'-12-31'));
  var nowM=new Date().getMonth(),nowY=new Date().getFullYear(),todayISO=calISO(new Date());
  var months='';
  for(var mo=0;mo<12;mo++){
    var first=new Date(y,mo,1);var sdow=(first.getDay()+6)%7;var din=new Date(y,mo+1,0).getDate();
    var cells='';for(var i=0;i<sdow;i++)cells+='<div></div>';
    for(var dd=1;dd<=din;dd++){var iso=y+'-'+calPad(mo+1)+'-'+calPad(dd);var has=byDay[iso]&&byDay[iso].length;var isT=iso===todayISO;cells+='<div class="cal-ymc'+(isT?' t':'')+(has?' has':'')+'">'+dd+'</div>';}
    months+='<div class="cal-ymon" onclick="calGoMonth('+y+','+mo+')"><div class="cal-ymname'+(mo===nowM&&y===nowY?' t':'')+'">'+first.toLocaleDateString(undefined,{month:'long'})+'</div><div class="cal-ymgrid">'+cells+'</div></div>';
  }
  return calHeader(String(y))+'<div class="cal-ygrid">'+months+'</div>';
}

function calMonthView(){
  var c=calCur();var y=c.getFullYear(),m=c.getMonth();
  var startDow=(new Date(y,m,1).getDay()+6)%7;var daysIn=new Date(y,m+1,0).getDate();
  var rows=Math.ceil((startDow+daysIn)/7);var gridStart=new Date(y,m,1-startDow);
  var byDay=calByDay(calItems(calISO(gridStart),calISO(new Date(gridStart.getFullYear(),gridStart.getMonth(),gridStart.getDate()+rows*7-1))));
  var todayISO=calISO(new Date());
  var dows=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'].map(function(d){return '<div class="cal-dow">'+d+'</div>';}).join('');
  var cells='';
  for(var i=0;i<rows*7;i++){
    var dt=new Date(gridStart.getFullYear(),gridStart.getMonth(),gridStart.getDate()+i);var iso=calISO(dt);
    var inM=dt.getMonth()===m;var isT=iso===todayISO;var its=(byDay[iso]||[]).slice().sort(calSort);
    var pills=its.slice(0,3).map(function(it){return '<div class="cal-pill" style="--c:'+it.color+';background:'+it.color+'22">'+esc(it.title)+'</div>';}).join('');
    var more=its.length>3?'<div class="cal-more">+'+(its.length-3)+'</div>':'';
    cells+='<div class="cal-mc'+(isT?' today':'')+(inM?'':' off')+'" onclick="calGoDay(\''+iso+'\')"><div class="cal-mnum">'+dt.getDate()+'</div>'+pills+more+'</div>';
  }
  return calHeader(new Date(y,m,1).toLocaleDateString(undefined,{month:'long',year:'numeric'}))+'<div class="cal-mdows">'+dows+'</div><div class="cal-mgrid">'+cells+'</div>';

function calGrid(days,fromISO,toISO,single){
  var byDay=calByDay(calItems(fromISO,toISO));
  var HH=single?CAL_HH_DAY:CAL_HH_WEEK;var totalH=24*HH;
  var hours='';for(var h=0;h<24;h++)hours+='<div class="cal-hr" style="height:'+HH+'px"><span>'+calHourLbl(h)+'</span></div>';
  var hlines='';for(var h2=0;h2<24;h2++){hlines+='<div class="cal-hrline" style="top:'+(h2*HH)+'px"></div>';hlines+='<div class="cal-hrline half" style="top:'+((h2+0.5)*HH)+'px"></div>';}
  var todayISO=calISO(new Date());var anyAD=false;
  var adcells=days.map(function(dy){var its=(byDay[dy.iso]||[]).filter(function(x){return x.allDay;});if(its.length)anyAD=true;return '<div class="cal-adcell">'+its.map(function(it){return '<div class="cal-adpill" style="--c:'+it.color+';background:'+it.color+'22" onclick="calOpenDay(\''+dy.iso+'\')">'+esc(it.title)+'</div>';}).join('')+'</div>';}).join('');
  var cols=days.map(function(dy){
    var timed=(byDay[dy.iso]||[]).filter(function(x){return !x.allDay&&calHM(x.start)!=null;}).map(function(x){var s=calHM(x.start),e=calHM(x.end)||s+0.75;return {s:s,e:Math.max(e,s+0.5),it:x};});
    calLayout(timed);
    var blk=timed.map(function(o){var top=o.s*HH,hgt=(o.e-o.s)*HH,w=100/o.lanes,left=o.lane*w,it=o.it;return '<div class="cal-blk" style="top:'+top+'px;height:'+(hgt-3)+'px;left:calc('+left+'% + 1px);width:calc('+w+'% - 3px);--c:'+it.color+'" onclick="calOpenDay(\''+dy.iso+'\')"><div class="cal-blk-t">'+esc(it.title)+'</div>'+(hgt>26?'<div class="cal-blk-s">'+esc(it.start+(it.end?' \u2013 '+it.end:''))+'</div>':'')+'</div>';}).join('');
    return '<div class="cal-col'+(dy.iso===todayISO?' today':'')+'">'+blk+'</div>';
  }).join('');
  var now=new Date();var nowH=now.getHours()+now.getMinutes()/60;var showNow=days.some(function(dy){return dy.iso===todayISO;});
  var nowEl=showNow?'<div class="cal-now" style="top:'+(nowH*HH)+'px"><span class="cal-now-time">'+calPad(now.getHours())+':'+calPad(now.getMinutes())+'</span><span class="cal-nowdot"></span></div>':'';
  var hdr='';
  if(!single){hdr='<div class="cal-tghdr"><div class="cal-gutter"></div><div class="cal-tgdays">'+days.map(function(dy){var t=dy.iso===todayISO;return '<div class="cal-tgdh" onclick="calPickDay(\''+dy.iso+'\')"><div class="cal-tgdn'+(t?' on':'')+'">'+dy.dn+'</div><div class="cal-tgdd'+(t?' on':'')+'">'+dy.dt.getDate()+'</div></div>';}).join('')+'</div></div>';}
  var adStrip=anyAD?'<div class="cal-ad"><div class="cal-gutter cal-adlbl">all-day</div><div class="cal-tgdays">'+adcells+'</div></div>':'';
  return hdr+adStrip+'<div class="cal-scroll"><div class="cal-tgbody"><div class="cal-gutter">'+hours+'</div><div class="cal-tggrid" style="height:'+totalH+'px">'+hlines+'<div class="cal-cols">'+cols+'</div>'+nowEl+'</div></div></div>';
}

function calWeekView(){
  var c=calCur();var dow=(c.getDay()+6)%7;var mon=new Date(c.getFullYear(),c.getMonth(),c.getDate()-dow);
  var days=[];for(var i=0;i<7;i++){var dt=new Date(mon.getFullYear(),mon.getMonth(),mon.getDate()+i);days.push({iso:calISO(dt),dt:dt,dn:['Mon','Tue','Wed','Thu','Fri','Sat','Sun'][i]});}
  return calHeader(mon.getDate()+' \u2013 '+days[6].dt.getDate()+' '+days[6].dt.toLocaleDateString(undefined,{month:'short'}))+'<div class="cal-card">'+calGrid(days,days[0].iso,days[6].iso,false)+'</div>';
}
function calDayView(){
  var c=calCur();var iso=calISO(c);var todayISO=calISO(new Date());
  var dow=(c.getDay()+6)%7;var mon=new Date(c.getFullYear(),c.getMonth(),c.getDate()-dow);
  var strip='<div class="cal-strip">'+[0,1,2,3,4,5,6].map(function(i){var dd=new Date(mon.getFullYear(),mon.getMonth(),mon.getDate()+i);var diso=calISO(dd);var sel=diso===iso;var t=diso===todayISO;return '<div class="cal-strip-d'+(sel?' sel':'')+'" onclick="calPickDay(\''+diso+'\')"><div class="cal-strip-dn">'+['M','T','W','T','F','S','S'][i]+'</div><div class="cal-strip-dd'+(t&&!sel?' t':'')+'">'+dd.getDate()+'</div></div>';}).join('')+'</div>';
  var days=[{iso:iso,dt:c,dn:c.toLocaleDateString(undefined,{weekday:'short'})}];
  return calHeader(c.toLocaleDateString(undefined,{weekday:'long',day:'numeric',month:'long'}))+strip+'<div class="cal-card">'+calGrid(days,iso,iso,true)+'</div>';
}
function calAgendaView(){
  var c=calCur();var byDay=calByDay(calItems(calISO(c),calISO(new Date(c.getFullYear(),c.getMonth(),c.getDate()+30))));
  var todayISO=calISO(new Date());var tmrISO=calISO(new Date(new Date().getFullYear(),new Date().getMonth(),new Date().getDate()+1));
  var html='';

function segLine(plan,sg){

  if(sg.reps&&sg.reps>1){var rec=sg.recoveryMin?(', '+(sg.recoveryMin<1?Math.round(sg.recoveryMin*60)+'s':sg.recoveryMin+' min')+' recovery'):'';return sg.reps+' \u00D7 '+amt+(pc?' @ '+pc:'')+rec;}
  return (sg.label?sg.label+': ':'')+amt+(pc?' @ '+pc:'');
}

function resetUserPin(id){
  if(!confirm('Reset this person\u2019s PIN?\n\nThey\u2019ll get a one-time temporary code, then set their own private PIN on next login \u2014 which you won\u2019t see.'))return;
  (async function(){
    var temp=String(Math.floor(1000+Math.random()*9000));
    try{
      var hash=await sha256hex(temp);
      await ownerResetPin(id,hash);
      await markPinReset(id);
      alert('Temporary PIN: '+temp+'\n\nGive this to them. On their next login they\u2019ll be asked to set their own private PIN \u2014 you won\u2019t be able to see it, and this code stops working once they do.');
      toast('PIN reset \u2713');

  })();
}

// ----- helpers -----
function cdContrast(hex){try{var h=hex.replace('#','');if(h.length===3)h=h[0]+h[0]+h[1]+h[1]+h[2]+h[2];var r=parseInt(h.slice(0,2),16),g=parseInt(h.slice(2,4),16),b=parseInt(h.slice(4,6),16);return (0.299*r+0.587*g+0.114*b)>150?'#16202E':'#FFFFFF';}catch(e){return '#FFFFFF';}}
function cdShade(hex,amt){try{var h=hex.replace('#','');if(h.length===3)h=h[0]+h[0]+h[1]+h[1]+h[2]+h[2];var r=parseInt(h.slice(0,2),16),g=parseInt(h.slice(2,4),16),b=parseInt(h.slice(4,6),16);r=Math.max(0,Math.min(255,Math.round(r+amt)));g=Math.max(0,Math.min(255,Math.round(g+amt)));b=Math.max(0,Math.min(255,Math.round(b+amt)));return '#'+[r,g,b].map(function(x){return ('0'+x.toString(16)).slice(-2);}).join('');}catch(e){return hex;}}
function cdDaysTo(c){var iso=c.d+'T'+((c.time||'00:00'))+':00';var t=new Date(iso);if(isNaN(t.getTime()))t=new Date(c.d+'T00:00:00');var today=new Date();today.setHours(0,0,0,0);var td=new Date(c.d+'T00:00:00');return Math.round((td-today)/86400000);}

function cdListHTML(a,filter){
  var future=[],past=[];
  a.forEach(function(c){(cdDaysTo(c)>=0?future:past).push(c);});
  future.sort(function(x,y){return cdDaysTo(x)-cdDaysTo(y);});
  past.sort(function(x,y){return cdDaysTo(y)-cdDaysTo(x);}); // most recent past first
  var show=filter==='past'?past:filter==='future'?future:future.concat(past);
  var filterBar='<div class="cd-filter">'+
    [['all','All'],['future','Upcoming'],['past','Past']].map(function(f){return '<button class="cd-chip'+(filter===f[0]?' on':'')+'" onclick="cdSetFilter(\''+f[0]+'\')">'+f[1]+'</button>';}).join('')+'</div>';
  var rows=show.map(function(c){
    var d=cdDaysTo(c);var isPast=d<0;var n=Math.abs(d);
    var fg=cdContrast(c.color);var numBg=cdShade(c.color,fg==='#FFFFFF'?-26:26);

function upToday(){var d=new Date();return d.getFullYear()+'-'+('0'+(d.getMonth()+1)).slice(-2)+'-'+('0'+d.getDate()).slice(-2);}
function upAddDays(n){var d=new Date();d.setDate(d.getDate()+(parseInt(n,10)||0));return d.getFullYear()+'-'+('0'+(d.getMonth()+1)).slice(-2)+'-'+('0'+d.getDate()).slice(-2);}
function upDays(s){if(!s||!/^\d{4}-\d{2}-\d{2}$/.test(s))return null;return Math.ceil((new Date(s+'T00:00:00')-new Date(upToday()+'T00:00:00'))/86400000);}
function upBadge(next){var d=upDays(next);if(d===null)return '';var st,tx;if(d<0){st='background:color-mix(in srgb,var(--danger) 16%,transparent);color:var(--danger)';tx='overdue';}else if(d===0){st='background:rgba(245,158,11,.18);color:#B45309';tx='today';}else if(d<=14){st='background:rgba(245,158,11,.14);color:#B45309';tx=d+'d';}else{st='';tx=d+'d';}return '<div class="badge"'+(st?(' style="'+st+'"'):'')+'>'+tx+'</div>';}
function upNext(a){if(!a.tasks||!a.tasks.length)return null;var s=a.tasks.filter(function(t){return t.next;}).sort(function(x,y){return x.next<y.next?-1:1;});return s[0]||null;}
function upCatIcon(c){return ({appliance:'home',vehicle:'car',home:'home',document:'file',subscription:'wallet'})[c]||'work';}

async function getUpkeep(){
  if(!currentUser)return[];
  var ck='forge.cache.upkeep.'+currentUser.id;
  try{
    var r=await sb.from('upkeep').select('*').eq('user_id',currentUser.id).order('created_at');
    if(r.error)throw r.error;
    var arr=(r.data||[]).map(function(x){return {id:x.id,name:x.name,brand:x.brand||'',category:x.category||'other',purchased:x.purchased||'',tasks:(typeof x.tasks==='string'?JSON.parse(x.tasks||'[]'):(x.tasks||[]))};});
    lsSet(ck,JSON.stringify(arr));return arr;
  }catch(e){var raw=lsGet(ck);if(raw){try{return JSON.parse(raw);}catch(_){}}throw e;}
}

  var cards=list.sort(function(a,b){var ta=upNext(a),tb=upNext(b);var da=ta?upDays(ta.next):9999,db=tb?upDays(tb.next):9999;return da-db;}).map(function(a){

function upkeepAdd(){
  openForm('Add to Upkeep','Name an appliance, vehicle, document or renewal \u2014 the coach sorts the schedule.',[{key:'q',label:'e.g. Bosch Series 6 washing machine'}],async function(v){
    var q=(v.q||'').trim();if(!q)return;closeOverlay();toast('Reading the manual\u2026');
    var sys='You are the scheduling brain of a home-upkeep app. The user names ONE thing they own: an appliance, vehicle, home system, document, warranty or subscription. Reply with ONLY a JSON object, no prose:\n{"name":"short name","brand":"brand/model or empty","category":"appliance|vehicle|home|document|subscription|other","purchased":"YYYY-MM or empty","tasks":[{"name":"short task","every_days":0,"first_due_days":0,"note":"short tip"}]}\nevery_days = recurrence in days (0 for a one-off). first_due_days = days from today until first due. Use realistic schedules: washing machine -> clean lint/pump filter 30, hot maintenance wash 60, wipe door seal 90, descale 180; fridge -> water filter 180, condenser coils 365; dishwasher -> filter 30, descale 180; boiler/furnace -> service 365; vehicle -> service 365, tyre check 90. For a document/warranty/passport/visa with an expiry date the user gives, make ONE task "Renew before it expires", every_days 0, first_due_days = days-until-expiry minus 45. 2 to 5 tasks max, names under 5 words.';
    try{
      var ans=await askAI([{role:'user',content:q}],sys,500);
      var jm=ans.match(/\{[\s\S]*\}/);if(!jm)throw new Error('no json');
      var o=JSON.parse(jm[0]);
      var tasks=(o.tasks||[]).slice(0,6).map(function(t,i){var ev=parseInt(t.every_days,10)||0;var fd=parseInt(t.first_due_days,10);if(isNaN(fd))fd=ev||30;return {id:'t'+Date.now()+i,name:String(t.name||'Maintain'),every:ev,next:upAddDays(Math.max(0,fd)),last:null,note:String(t.note||'')};});
      if(!tasks.length)tasks=[{id:'t'+Date.now(),name:'Check / service',every:180,next:upAddDays(180),last:null,note:''}];
      await saveUpkeepItem({name:o.name||q,brand:o.brand||'',category:o.category||'other',purchased:o.purchased||'',tasks:tasks});
      toast('Added \u2014 '+tasks.length+' reminder'+(tasks.length>1?'s':'')+' set \u2713');await refreshScreen();
    }catch(e){toast('Couldn\u2019t set that up \u2014 try naming it more specifically');}
  });

    });
  }catch(e){}

  try{
    [['rego','Rego'],['insurance','Insurance'],['service','Service']].forEach(function(p){
      var v=s.car&&s.car[p[0]];if(!v)return;var d=_bDaysFromToday(v);if(d===null)return;

    });
  }catch(e){}
  // 4) Calendar event today/tomorrow
  try{
    (s.events||[]).forEach(function(e){
      var d=_bDaysFromToday(e.date);if(d===null||d<0||d>1)return;
      ins.push({id:'ev-'+e.id,icon:'calendar',sev:d===0?1:0,text:(d===0?'Today':'Tomorrow')+': '+e.title+(e.start?' at '+e.start:''),tab:'calendar'});

      else if(pct>=0.85)ins.push({id:'bud-'+b.id,icon:'wallet',sev:0,text:b.n+' budget '+Math.round(pct*100)+'% used (A$'+b.spent+'/'+b.limit+').',tab:'finances'});
    });
  }catch(e){}
  // 6) Low mood today → gentle nudge (well-being, never clinical)

      ins.push({id:'sleep-low',icon:'spark',sev:0,text:'Only '+sl0.value+'h sleep last night \u2014 worth a lighter day if you can.',tab:'health'});
  }catch(e){}
  // 8) Overdue tasks (due date in past)
  try{
    var od=(s.work||[]).filter(function(t){return t.due&&_bDaysFromToday(t.due)<0&&!t.done;});
    if(od.length)ins.push({id:'task-overdue',icon:'check',sev:1,text:od.length+' task'+(od.length!==1?'s are':' is')+' overdue. Top: '+od[0].t+'.',tab:'work'});

async function runAIActions(actions){
  var done=[];
  for(var i=0;i<actions.length&&i<25;i++){
    var a=actions[i]||{};var t=String(a.type||'').toLowerCase();
    try{
      if(t==='add_task'&&a.title){await addItemDB('work',a.title,a.note||null);done.push('Added task: '+a.title);}
      else if(t==='add_reminder'&&a.title){await addItemDB('reminders',a.title,a.note||null);done.push('Added reminder: '+a.title);}
      else if(t==='add_goal'&&a.title){await addItemDB('goals',a.title,a.note||null);done.push('Added goal: '+a.title);}
      else if(t==='add_note'&&a.title){await addItemDB('notes',a.title,a.note||null);done.push('Added note: '+a.title);}
      else if(t==='add_shopping'){var its=a.items||(a.title?[a.title]:[]);for(var j=0;j<its.length;j++){await addItemDB('shopping',String(its[j]),null);}if(its.length)done.push('Added '+its.length+' item'+(its.length!==1?'s':'')+' to shopping');}
      else if(t==='add_to_list'&&a.title&&catalogById(a.tab)){await addItemDB(a.tab,a.title,a.note||null);done.push('Added to '+a.tab+': '+a.title);}
      else if(t==='set_dinner'&&a.day&&a.meal){await setMealDB(normDay(a.day),'d',a.meal);done.push('Set '+normDay(a.day)+' dinner: '+a.meal);}
      else if(t==='plan_week_dinners'&&a.meals){var n=0;for(var dk in a.meals){if(a.meals.hasOwnProperty(dk)&&a.meals[dk]){await setMealDB(normDay(dk),'d',a.meals[dk]);n++;}}if(n)done.push('Planned '+n+' dinner'+(n!==1?'s':''));}
      else if(t==='add_countdown'&&a.name&&a.date){await addCountdownDB(a.name,a.date);done.push('Added countdown: '+a.name+' ('+a.date+')');}
    }catch(e){/* skip a bad action, keep going */}
  }
  _ctxCache.t=0;             // invalidate context so the AI sees the new data next turn
  _brainCache.t=0;_brainCache.ins=null; // refresh brain insights too
  return done;
}
// Count-up engine — animates any .cnt[data-to] number into view
function fmtCount(n,fmt){n=Math.round(n);if(fmt==='gbp')return '\u00A3'+n.toLocaleString('en-GB');if(fmt==='aud')return 'A$'+n.toLocaleString('en-AU');return n.toLocaleString();}
function countUpScan(root){
  if(!root||!root.querySelectorAll)return;
  root.querySelectorAll('.cnt[data-to]').forEach(function(el){
    if(el.getAttribute('data-done'))return; el.setAttribute('data-done','1');
    var to=parseFloat(el.getAttribute('data-to'))||0,fmt=el.getAttribute('data-fmt')||'';
    if(Math.abs(to)<1){el.textContent=fmtCount(to,fmt);return;}
    var dur=950,start=null;
    function step(ts){if(!start)start=ts;var p=Math.min(1,(ts-start)/dur);var e=1-Math.pow(1-p,3);el.textContent=fmtCount(to*e,fmt);if(p<1)requestAnimationFrame(step);}
    requestAnimationFrame(step);
  });
}
async function aiSend(){
  var i=document.getElementById('aiInput');var v=i?i.value.trim():'';if(!v||aiTyping)return;
  if(i)i.value='';
  aiMsgs.push({r:'me',t:v});
  if(aiUsage()>=AI_DAILY_CAP){aiMsgs.push({r:'ai',t:'You\u2019ve reached today\u2019s AI limit ('+AI_DAILY_CAP+' messages) \u2014 it resets tomorrow.'});aiRepaint();return;}
  aiTyping=true;aiRepaint();
  try{
    var ctx=await gatherUserContext();
    var _bi=[];try{_bi=await brainInsights();}catch(e){}
    var _biTxt=brainInsightsText(_bi);
    var first=currentUser?currentUser.name.split(' ')[0]:'the user';
    var system='You are Forge AI, the sharp, friendly assistant inside '+first+'\u2019s personal life-dashboard app called Forge. '+
      'Forge organises their life into Time, Money, Food, Fitness, Home and Personal. '+
      'Be concise, warm and practical \u2014 a few short sentences unless they ask for more. '+
      'Use the data snapshot below to answer specifically about THEM, and proactively spot useful connections (an upcoming countdown, an overdue car date, a meal plan that needs a shopping list). '+
      'If a FUTURE ME profile is present, treat it as their north star: gently favour suggestions and actions that compound toward it, and flag when something pulls away from it. '+
      'Never invent data you weren\u2019t given.'+
      '\n\nACTIONS \u2014 you can DO things, not just answer. If the user asks you to add, create, plan or save something, perform it by appending ONE fenced block at the very END of your reply:\n```forge\n[ {"type":"add_task","title":"Call dentist"} ]\n```\n'+
      'Allowed types ONLY: add_task{title,note?}, add_reminder{title,note?}, add_goal{title}, add_note{title}, add_shopping{items:[..]}, set_dinner{day,meal}, plan_week_dinners{meals:{Mon:"..",Tue:".."}}, add_countdown{name,date:"YYYY-MM-DD"}, add_to_list{tab,title,note?}. '+
      'For anything not covered by a specific type, use add_to_list with one of their section ids: '+(enabledTabs().join(', ')||'(none yet)')+'. '+
      'Use real values, never placeholders. Days are Mon..Sun. Always also write a short friendly confirmation in your prose, but NEVER print the raw JSON there. Omit the block entirely when no action is needed.'+
      '\n\nTHEIR FORGE DATA:\n'+ctx+(_biTxt?('\n\n'+_biTxt):'');
    var hist=aiMsgs.slice(-10).map(function(m){return {role:m.r==='me'?'user':'assistant',content:m.t};});
    var ans=await askAI(hist,system,800);
    aiBump();aiTyping=false;
    var actions=extractActions(ans);
    var clean=String(ans).replace(/```forge[\s\S]*?```/i,'').replace(/```json[\s\S]*?```/i,'').trim();
    aiMsgs.push({r:'ai',t:clean||'Done.'});
    if(actions&&actions.length){var did=await runAIActions(actions);if(did.length)aiMsgs.push({r:'ai',t:'\u2713 '+did.join('\n\u2713 ')});}
    aiRepaint();
  }catch(e){
    aiTyping=false;
    var em=String((e&&e.message)||e||'unknown error');
    var local=await aiAnswerLocal(v);
    aiMsgs.push({r:'ai',t:local+'\n\n\u26A0\uFE0F AI not connected \u2014 '+em});
    aiRepaint();
  }
  var inp=document.getElementById('aiInput');if(inp)inp.focus();
}

async function renderOwner(){

  var reqs=await getRequestsDB();
  var logins=await getLoginEvents();
  var now=new Date();var today=now.toDateString();var weekAgo=now.getTime()-7*86400000;
  var activeToday={},weekCount=0,perUser={};
  logins.forEach(function(l){var ts=new Date(l.created_at).getTime();if(new Date(l.created_at).toDateString()===today)activeToday[l.user_id]={name:l.user_name,t:ts};if(ts>=weekAgo){weekCount++;perUser[l.user_name]=(perUser[l.user_name]||0)+1;}});
  var activeHtml=Object.keys(activeToday).length?Object.keys(activeToday).map(function(id){var a=activeToday[id];return '<div class="row">'+avatarHTML(a.name,34,null)+'<div style="flex:1"><div class="rt">'+esc(a.name)+'</div><div class="rs">last in '+timeAgo(a.t)+'</div></div><span class="dot" style="background:#2F6BFF"></span></div>';}).join(''):'<div class="row"><div class="rs">No logins today yet.</div></div>';
  var weekHtml=Object.keys(perUser).length?Object.keys(perUser).sort(function(a,b){return perUser[b]-perUser[a];}).map(function(nm){return '<div class="row"><div style="flex:1"><div class="rt">'+esc(nm)+'</div></div><div class="badge">'+perUser[nm]+' login'+(perUser[nm]!==1?'s':'')+'</div></div>';}).join(''):'<div class="row"><div class="rs">No logins this week.</div></div>';
  var pHtml=profiles.map(function(u){return '<div class="row">'+avatarHTML(u.name,34,u.avatar_url)+'<div style="flex:1"><div class="rt">'+esc(u.name)+(u.role==='master'?' <span class="badge">You</span>':'')+'</div><div class="rs">'+(u.role==='master'?'Owner':'Member')+'</div></div>'+(u.role!=='master'?'<button class="tbtn add" style="margin-right:6px" onclick="resetUserPin(\''+u.id+'\')">Reset PIN</button><button class="tbtn rm" onclick="removeUser(\''+u.id+'\')">Remove</button>':'')+'</div>';}).join('');
  var rHtml=reqs.length?reqs.map(function(r){return '<div class="row"><span class="dot" style="background:var(--accent)"></span><div style="flex:1"><div class="rt">'+esc(r.body)+'</div><div class="rs">'+esc(r.user_name||'Someone')+' · '+timeAgo(new Date(r.created_at).getTime())+'</div></div></div>';}).join(''):'<div class="row"><div class="rs">No requests yet.</div></div>';
  return '<div class="stack">'+
    '<div class="card dark"><div class="small">Owner Dashboard</div><div class="serif" style="font-size:24px;font-weight:600;margin-top:2px">'+Object.keys(activeToday).length+' active today</div><div style="font-size:14px;opacity:.82;margin-top:6px">'+profiles.length+' member'+(profiles.length!==1?'s':'')+' · '+weekCount+' login'+(weekCount!==1?'s':'')+' this week</div></div>'+
    '<div class="card"><div class="ctitle">Active today</div>'+activeHtml+'</div>'+
    '<div class="card"><div class="ctitle">Logins this week</div>'+weekHtml+'<div class="note">'+icon('clock',13)+'<div>A weekly Monday 9am email is set up via Supabase (see setup steps) — this shows the same data live.</div></div></div>'+
    '<div class="card"><div class="ctitle">Members</div>'+pHtml+'<button class="reqbtn" onclick="openAddUser()" style="margin-top:12px">'+icon('plus',16)+' Add a user</button></div>'+
    '<div class="card"><div class="ctitle">Feature requests</div>'+rHtml+'<div class="note">'+icon('send',13)+'<div>New requests email you at '+esc(OWNER_EMAIL)+' once the email function is deployed.</div></div></div>'+
    '<div class="card"><div class="ctitle">Invite someone</div><div class="rs" style="margin-bottom:10px">Share a personal invite link to Forge.</div><button class="btn btn-primary" onclick="copyInvite()" style="width:100%">'+icon('share',16)+' Copy invite link</button></div></div>';
}
function copyInvite(){
  var who=encodeURIComponent(currentUser?currentUser.name:'a friend');
  var url=location.origin+location.pathname+'?invite='+who;
  if(navigator.share){navigator.share({title:'Forge',text:'You\'re invited to Forge — an app built by Harvey Betts',url:url}).catch(function(){});return;}
  if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(url).then(function(){toast('Invite link copied ✓');},function(){prompt('Copy this link:',url);});}
  else prompt('Copy this link:',url);
}

(function(){
  sizeApp();
  var fromInvite=/(?:[?&#])invite/.test(location.search+location.hash);
  // Build the home screen UNDER the intro so there's no flash when intro lifts.
  // But we must NOT show home until authed — so we only mount the intro now,
  // and reveal PIN exactly as the intro lifts (fixes glitch #13).
  setTimeout(async function(){
    var intro=document.getElementById('intro');
    var fromInvite=/(?:[?&#])invite/.test(location.search+location.hash);
    try{
      if(/type=recovery/.test(location.hash)){ showResetPassword(); }
      else {
        var sres=await sb.auth.getSession();
        var session=sres&&sres.data&&sres.data.session;
        if(session){
          var prof=await resolveProfile();
          if(prof){ currentUser={id:prof.id,name:prof.name,role:prof.role,avatar_url:prof.avatar_url};
            if(lsGet(pinKey(prof.id))){ showPinUnlock(); } else { showSetPin(false); } }
          else { showAuthLogin(); }
        } else if(fromInvite){ showAuthSignup(); }
        else { showAuthLogin(); }
      }
    }catch(e){ showAuthLogin(); }
    try{document.documentElement.style.background='#F3F5F8';document.body.style.background='#F3F5F8';}catch(e){}
    intro.classList.add('hide');
    setTimeout(function(){if(intro&&intro.parentNode)intro.parentNode.removeChild(intro);},720);
  },2600); // tight, confident splash — icon grows in, holds a beat, lifts
})();

(function(){

  document.addEventListener('focusin',function(e){var t=e.target;if(t&&(t.tagName==='INPUT'||t.tagName==='TEXTAREA')){if(t.closest&&(t.closest('.sheet')||t.closest('.ai-bar')))return;setTimeout(function(){intoView(t);},320);}});
  if(vv){var apply=function(){
    var ot=Math.max(0,vv.offsetTop||0);
    var kb=Math.max(0,Math.round(window.innerHeight-vv.height-ot));
    document.documentElement.style.setProperty('--kb',kb+'px');sizeApp();
    var open=kb>60;var lift=open?('translateY(-'+kb+'px)'):'';
    var sh=document.querySelector('.overlay .sheet');
    if(sh){
      sh.style.transition='transform .24s cubic-bezier(.2,.85,.25,1),max-height .24s ease';
      sh.style.transform=lift;
      sh.style.maxHeight=open?((vv.height-16)+'px'):'';

    }

    if(!open&&window.pageYOffset)window.scrollTo(0,0);
  };vv.addEventListener('resize',apply);vv.addEventListener('scroll',apply);}
})();
